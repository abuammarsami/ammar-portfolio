<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" role="img" aria-labelledby="bgj-ladder-title">
  <title id="bgj-ladder-title">The nested timeout ladder: an HTTP attempt timeout of 20s sits inside a 90s total-HTTP budget with three short Polly retries, inside the job wall-clock enforced by a linked CTS, inside Hangfire's 60s to 2h five-retry curve, and finally the durable dead-letter with its email and webhook alert — each layer's deadline larger than the one it wraps</title>
  <defs>
    <marker id="bgj4-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
    </marker>
  </defs>
  <style>
    @keyframes a4-esc { 0%, 100% { opacity: 0; } 6% { opacity: 0.95; } 20% { opacity: 0; } }
    @keyframes a4-core { 0%, 100% { r: 5; opacity: 0.5; } 50% { r: 8; opacity: 1; } }
    .a4-pulse {
      fill: none;
      stroke: var(--color-q0, #5fc9bf);
      stroke-width: 2.5;
      filter: drop-shadow(0 0 5px var(--color-q0, #5fc9bf));
      animation: a4-esc 6.6s ease-in-out infinite;
    }
    .a4-p1 { animation-delay: 0s; }
    .a4-p2 { animation-delay: 1.1s; }
    .a4-p3 { animation-delay: 2.2s; }
    .a4-p4 { animation-delay: 3.3s; }
    .a4-p5 { animation-delay: 4.4s; }
    .a4-core {
      fill: var(--color-q0, #5fc9bf);
      filter: drop-shadow(0 0 6px var(--color-q0, #5fc9bf));
      animation: a4-core 2.4s ease-in-out infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .a4-pulse { animation: none; opacity: 0; }
      .a4-core { animation: none; opacity: 0.6; }
    }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- L5 · dead-letter + alert (outermost) -->
    <rect x="40" y="36" width="820" height="384" rx="8" fill="none" stroke="var(--color-q1, #9d8cff)" stroke-width="2" stroke-dasharray="6 5" opacity="0.9" />
    <text x="450" y="58" text-anchor="middle" font-size="12">dead-letter + alert</text>
    <text x="450" y="72" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">dbo.JobDeadLetter · email + webhook</text>

    <!-- L4 · Hangfire retry curve -->
    <rect x="62" y="76" width="776" height="326" rx="7" fill="none" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="450" y="98" text-anchor="middle" font-size="12">Hangfire retry curve</text>
    <text x="450" y="112" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">60s→5m→30m→2h ×5 · ~4.5h window</text>

    <!-- L3 · job wall-clock -->
    <rect x="84" y="116" width="732" height="268" rx="7" fill="none" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="450" y="138" text-anchor="middle" font-size="12">job wall-clock</text>
    <text x="450" y="152" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">linked CTS · caps the whole job</text>

    <!-- L2 · total HTTP budget (Polly) -->
    <rect x="106" y="156" width="688" height="210" rx="6" fill="none" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="450" y="178" text-anchor="middle" font-size="12">total HTTP budget · 90s</text>
    <text x="450" y="192" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">Polly · 3 short retries · 500ms</text>

    <!-- L1 · HTTP attempt (innermost, concrete box) -->
    <rect x="128" y="196" width="644" height="152" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="450" y="246" text-anchor="middle" font-size="12">HTTP attempt</text>
    <text x="450" y="282" text-anchor="middle" font-size="20" fill="var(--color-q0, #5fc9bf)">20s</text>
    <text x="450" y="306" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">per-request try · AttemptTimeout</text>

    <!-- escalation direction hint -->
    <line x1="795" y1="272" x2="847" y2="272" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6" marker-end="url(#bgj4-ah)" />
    <text x="820" y="262" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">escalates</text>

    <!-- the hang starts at the tightest level -->
    <circle class="a4-core" cx="450" cy="224" r="5" />

    <!-- escalation pulses: innermost deadline blows → next layer catches, outward (self-contained CSS; removed under reduced-motion) -->
    <rect class="a4-pulse a4-p1" x="128" y="196" width="644" height="152" rx="6" />
    <rect class="a4-pulse a4-p2" x="106" y="156" width="688" height="210" rx="6" />
    <rect class="a4-pulse a4-p3" x="84" y="116" width="732" height="268" rx="7" />
    <rect class="a4-pulse a4-p4" x="62" y="76" width="776" height="326" rx="7" />
    <rect class="a4-pulse a4-p5" x="40" y="36" width="820" height="384" rx="8" />

    <!-- caption -->
    <text x="450" y="456" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">Fig. — the nested timeout ladder: each layer's deadline is larger than the one it wraps, so a hang is caught</text>
    <text x="450" y="474" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">at the tightest level and escalates outward to a dead-letter.</text>
  </g>
</svg>
