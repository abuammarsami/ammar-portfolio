<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440" role="img" aria-labelledby="bgj-outbox-title">
  <title id="bgj-outbox-title">Outbox sequence: the API commits business state and an outbox row in one transaction; the dispatcher then claims pending rows with READPAST plus a lease, enqueues to Hangfire, and marks dispatched — so a crash re-claims the row, making delivery at-least-once</title>
  <defs>
    <marker id="bgj2-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
    </marker>
  </defs>
  <style>
    @keyframes a2-s1 { 0%{opacity:0;stroke-dashoffset:260} 6%{opacity:1} 8%{stroke-dashoffset:0} 100%{opacity:1;stroke-dashoffset:0} }
    @keyframes a2-s2 { 0%,16%{opacity:0;stroke-dashoffset:260} 22%{opacity:1} 24%{stroke-dashoffset:0} 100%{opacity:1;stroke-dashoffset:0} }
    @keyframes a2-s3 { 0%,32%{opacity:0} 40%{opacity:1} 100%{opacity:1} }
    @keyframes a2-s4 { 0%,48%{opacity:0;stroke-dashoffset:260} 54%{opacity:1} 56%{stroke-dashoffset:0} 100%{opacity:1;stroke-dashoffset:0} }
    @keyframes a2-s5 { 0%,64%{opacity:0;stroke-dashoffset:260} 70%{opacity:1} 72%{stroke-dashoffset:0} 100%{opacity:1;stroke-dashoffset:0} }
    @keyframes a2-play { 0%{transform:translateY(0);opacity:0} 5%{opacity:1} 92%{opacity:1} 100%{transform:translateY(318px);opacity:0} }
    .a2-s1 { animation: a2-s1 7s linear infinite; }
    .a2-s2 { animation: a2-s2 7s linear infinite; }
    .a2-s3 { animation: a2-s3 7s linear infinite; }
    .a2-s4 { animation: a2-s4 7s linear infinite; }
    .a2-s5 { animation: a2-s5 7s linear infinite; }
    .a2-play { fill: var(--color-q0, #5fc9bf); filter: drop-shadow(0 0 4px var(--color-q0, #5fc9bf)); animation: a2-play 7s linear infinite; }
    @media (prefers-reduced-motion: reduce) {
      .a2-s1, .a2-s2, .a2-s3, .a2-s4, .a2-s5 { animation: none; opacity: 1; stroke-dashoffset: 0; }
      .a2-play { animation: none; opacity: 0; }
    }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- lane heads -->
    <rect x="52" y="28" width="116" height="46" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="110" y="56" text-anchor="middle" font-size="12">Partners.Api</text>
    <rect x="284" y="28" width="132" height="46" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="350" y="50" text-anchor="middle" font-size="12">SQL Server</text>
    <text x="350" y="66" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">one transaction</text>
    <rect x="510" y="28" width="150" height="46" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="585" y="56" text-anchor="middle" font-size="12">OutboxDispatcher</text>
    <rect x="726" y="28" width="128" height="46" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-q1, #9d8cff)" stroke-width="2" />
    <text x="790" y="50" text-anchor="middle" font-size="12">Hangfire</text>
    <text x="790" y="66" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">[HangFire]</text>

    <!-- lifelines -->
    <g stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" stroke-dasharray="4 5" opacity="0.6">
      <line x1="110" y1="74" x2="110" y2="404" />
      <line x1="350" y1="74" x2="350" y2="404" />
      <line x1="585" y1="74" x2="585" y2="404" />
      <line x1="790" y1="74" x2="790" y2="404" />
    </g>

    <!-- playhead travelling down the SQL lifeline -->
    <circle class="a2-play" cx="350" cy="82" r="4" />

    <!-- 1. atomic write -->
    <text class="a2-s1" x="230" y="104" text-anchor="middle" font-size="10.5" fill="var(--color-ink, #e9e7e0)">BEGIN TRAN → write state + INSERT JobOutbox → COMMIT</text>
    <line class="a2-s1" x1="110" y1="112" x2="348" y2="112" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" stroke-dasharray="260" marker-end="url(#bgj2-ah)" />
    <text class="a2-s1" x="350" y="140" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">atomic — both rows commit, or neither</text>

    <!-- loop fragment -->
    <rect x="250" y="166" width="580" height="176" rx="3" fill="none" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" stroke-dasharray="6 5" opacity="0.6" />
    <path d="M 250 166 h 66 v 14 l -10 10 h -56 z" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" opacity="0.9" />
    <text x="258" y="181" font-size="10.5" fill="var(--color-muted, #8a8f9c)">loop</text>
    <text x="324" y="181" font-size="10.5" fill="var(--color-muted, #8a8f9c)">every minute · SkipConcurrentExecution</text>

    <!-- 2. claim -->
    <text class="a2-s2" x="468" y="206" text-anchor="middle" font-size="10.5">claim pending (UPDLOCK, ROWLOCK, READPAST + lease)</text>
    <line class="a2-s2" x1="583" y1="214" x2="352" y2="214" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" stroke-dasharray="260" marker-end="url(#bgj2-ah)" />

    <!-- 3. return batch -->
    <text class="a2-s3" x="468" y="244" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">OUTPUT inserted.* — the claimed batch</text>
    <line class="a2-s3" x1="352" y1="252" x2="583" y2="252" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#bgj2-ah)" />

    <!-- 4. enqueue -->
    <text class="a2-s4" x="688" y="286" text-anchor="middle" font-size="10.5">Enqueue(job)</text>
    <line class="a2-s4" x1="587" y1="294" x2="788" y2="294" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" stroke-dasharray="260" marker-end="url(#bgj2-ah)" />

    <!-- 5. mark dispatched -->
    <text class="a2-s5" x="468" y="324" text-anchor="middle" font-size="10.5">mark dispatched (ClaimedBy guard)</text>
    <line class="a2-s5" x1="583" y1="332" x2="352" y2="332" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" stroke-dasharray="260" marker-end="url(#bgj2-ah)" />

    <!-- footer -->
    <text x="440" y="382" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">crash before “mark dispatched” → lease expires → row re-claimed → at-least-once delivery</text>
    <text x="440" y="404" text-anchor="middle" font-size="11" fill="var(--color-q0, #5fc9bf)">so every handler must be idempotent</text>
  </g>
</svg>
