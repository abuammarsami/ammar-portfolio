<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="pleg-t pleg-d">
  <title id="pleg-t">Legacy dbo.OnlinePayment versus the new dbo.Payment platform</title>
  <desc id="pleg-d">A row-by-row contrast. The legacy OnlinePayment table stored money as NVARCHAR up to two hundred characters; the new Payment stores DECIMAL eighteen-two. Legacy crammed every feature and bKash's API shape into one wide table; the new ledger is generic with a Purpose discriminator and a nullable ReferenceId. Legacy trusted the callback from client-side state; the new pipeline recomputes and stores the order amount server-side, verifies with the vendor, and cross-checks the captured amount. Legacy copy-pasted the verify-claim-fulfil sequence into each feature where it drifted; the new code has one shared coordinator. Legacy short-circuited a re-delivered callback with an already-settled return-success that lost money; the new coordinator always re-runs the idempotent fulfilment. Legacy had no recovery; the new system reconciles every five minutes. Hover or focus a row to read the consequence.</desc>
  <style>
    .pleg-row{ cursor:pointer; transition:opacity .2s ease; }
    .pleg-row:focus{ outline:none; }
    .pleg-hit{ fill:transparent; }
    svg:hover .pleg-row:not(:hover),
    svg:focus-within .pleg-row:not(:focus-within){ opacity:.3; }
    .pleg-box{ transition:stroke-width .2s ease; }
    .pleg-row:hover .pleg-box,
    .pleg-row:focus-within .pleg-box{ stroke-width:2; }
    .pleg-note{ opacity:0; transition:opacity .18s ease; }
    .pleg-row:hover .pleg-note,
    .pleg-row:focus-within .pleg-note{ opacity:1; }
    .pleg-hint{ opacity:.6; }
    svg:hover .pleg-hint, svg:focus-within .pleg-hint{ opacity:0; transition:opacity .25s ease; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} }
  </style>
  <g style="font-family:var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)" font-size="12">
    <text x="184" y="30" text-anchor="middle" font-size="11" letter-spacing="1" fill="var(--color-error,#ef4444)">LEGACY &#183; dbo.OnlinePayment</text>
    <text x="536" y="30" text-anchor="middle" font-size="11" letter-spacing="1" fill="var(--color-q0,#5fc9bf)">NEW &#183; dbo.Payment</text>
    <line x1="360" y1="44" x2="360" y2="450" stroke="var(--color-muted,#8a8f9c)" stroke-width="1" opacity="0.35" stroke-dasharray="3 5"/>

    <!-- Row 1: money type -->
    <g class="pleg-row" tabindex="0" role="group" aria-label="Money type: legacy NVARCHAR text versus new DECIMAL">
      <title>Money type: legacy NVARCHAR text versus new DECIMAL</title>
      <rect class="pleg-hit" x="26" y="56" width="668" height="52"/>
      <rect class="pleg-box" x="28" y="58" width="316" height="48" rx="6" fill="var(--color-error,#ef4444)" fill-opacity="0.08" stroke="var(--color-error,#ef4444)" stroke-width="1.3"/>
      <rect class="pleg-box" x="376" y="58" width="316" height="48" rx="6" fill="var(--color-q0,#5fc9bf)" fill-opacity="0.1" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.3"/>
      <text x="186" y="80" text-anchor="middle" font-size="10.5">Amount NVARCHAR(200)</text>
      <text class="pleg-note" x="186" y="97" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">money as free text &#8212; no arithmetic safety</text>
      <text x="534" y="80" text-anchor="middle" font-size="10.5">Amount DECIMAL(18,2)</text>
      <text class="pleg-note" x="534" y="97" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">real money, server-recomputed total</text>
      <text x="360" y="86" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">vs</text>
    </g>

    <!-- Row 2: table shape -->
    <g class="pleg-row" tabindex="0" role="group" aria-label="Table shape: one wide crammed table versus generic ledger">
      <title>Table shape: one wide crammed table versus generic ledger</title>
      <rect class="pleg-hit" x="26" y="114" width="668" height="52"/>
      <rect class="pleg-box" x="28" y="116" width="316" height="48" rx="6" fill="var(--color-error,#ef4444)" fill-opacity="0.08" stroke="var(--color-error,#ef4444)" stroke-width="1.3"/>
      <rect class="pleg-box" x="376" y="116" width="316" height="48" rx="6" fill="var(--color-q0,#5fc9bf)" fill-opacity="0.1" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.3"/>
      <text x="186" y="138" text-anchor="middle" font-size="10.5">one wide table per feature</text>
      <text class="pleg-note" x="186" y="155" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">every feature + bKash's shape crammed in</text>
      <text x="534" y="138" text-anchor="middle" font-size="10.5">Purpose + ReferenceId ledger</text>
      <text class="pleg-note" x="534" y="155" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">one ledger; a new feature adds one enum value</text>
      <text x="360" y="144" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">vs</text>
    </g>

    <!-- Row 3: callback trust -->
    <g class="pleg-row" tabindex="0" role="group" aria-label="Callback trust: client-trusted versus server-stored plus vendor verify plus amount cross-check">
      <title>Callback trust: client-trusted versus server-stored plus vendor verify plus amount cross-check</title>
      <rect class="pleg-hit" x="26" y="172" width="668" height="52"/>
      <rect class="pleg-box" x="28" y="174" width="316" height="48" rx="6" fill="var(--color-error,#ef4444)" fill-opacity="0.08" stroke="var(--color-error,#ef4444)" stroke-width="1.3"/>
      <rect class="pleg-box" x="376" y="174" width="316" height="48" rx="6" fill="var(--color-q0,#5fc9bf)" fill-opacity="0.1" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.3"/>
      <text x="186" y="196" text-anchor="middle" font-size="10.5">callback trusted from client</text>
      <text class="pleg-note" x="186" y="213" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">a tampered amount could settle a cheap order</text>
      <text x="534" y="196" text-anchor="middle" font-size="10.5">verify + amount cross-check</text>
      <text class="pleg-note" x="534" y="213" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">vendor verify vs server amount &#8594; AMOUNT_MISMATCH</text>
      <text x="360" y="202" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">vs</text>
    </g>

    <!-- Row 4: settlement code -->
    <g class="pleg-row" tabindex="0" role="group" aria-label="Settlement code: copy-pasted per feature versus one shared coordinator">
      <title>Settlement code: copy-pasted per feature versus one shared coordinator</title>
      <rect class="pleg-hit" x="26" y="230" width="668" height="52"/>
      <rect class="pleg-box" x="28" y="232" width="316" height="48" rx="6" fill="var(--color-error,#ef4444)" fill-opacity="0.08" stroke="var(--color-error,#ef4444)" stroke-width="1.3"/>
      <rect class="pleg-box" x="376" y="232" width="316" height="48" rx="6" fill="var(--color-q0,#5fc9bf)" fill-opacity="0.1" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.3"/>
      <text x="186" y="254" text-anchor="middle" font-size="10.5">verify&#8594;claim&#8594;fulfil, copy-pasted</text>
      <text class="pleg-note" x="186" y="271" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">4 settlers drifted apart &#8212; defects diverged</text>
      <text x="534" y="254" text-anchor="middle" font-size="10.5">one shared coordinator</text>
      <text class="pleg-note" x="534" y="271" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">written + audited once; settlers supply only fulfil</text>
      <text x="360" y="260" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">vs</text>
    </g>

    <!-- Row 5: re-delivery -->
    <g class="pleg-row" tabindex="0" role="group" aria-label="Re-delivery: already-settled short-circuit lost money versus always idempotent fulfil">
      <title>Re-delivery: already-settled short-circuit lost money versus always idempotent fulfil</title>
      <rect class="pleg-hit" x="26" y="288" width="668" height="52"/>
      <rect class="pleg-box" x="28" y="290" width="316" height="48" rx="6" fill="var(--color-error,#ef4444)" fill-opacity="0.08" stroke="var(--color-error,#ef4444)" stroke-width="1.3"/>
      <rect class="pleg-box" x="376" y="290" width="316" height="48" rx="6" fill="var(--color-q0,#5fc9bf)" fill-opacity="0.1" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.3"/>
      <text x="186" y="312" text-anchor="middle" font-size="10.5">already settled &#8594; return success</text>
      <text class="pleg-note" x="186" y="329" text-anchor="middle" font-size="9" fill="var(--color-error,#ef4444)">a failed fulfil was never retried &#8212; charged, undelivered</text>
      <text x="534" y="312" text-anchor="middle" font-size="10.5">ALWAYS re-run idempotent fulfil</text>
      <text class="pleg-note" x="534" y="329" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">FulfilledDate claimed once &#8594; self-heals, no double credit</text>
      <text x="360" y="318" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">vs</text>
    </g>

    <!-- Row 6: recovery -->
    <g class="pleg-row" tabindex="0" role="group" aria-label="Recovery: none versus reconciliation every five minutes">
      <title>Recovery: none versus reconciliation every five minutes</title>
      <rect class="pleg-hit" x="26" y="346" width="668" height="52"/>
      <rect class="pleg-box" x="28" y="348" width="316" height="48" rx="6" fill="var(--color-error,#ef4444)" fill-opacity="0.08" stroke="var(--color-error,#ef4444)" stroke-width="1.3"/>
      <rect class="pleg-box" x="376" y="348" width="316" height="48" rx="6" fill="var(--color-q0,#5fc9bf)" fill-opacity="0.1" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.3"/>
      <text x="186" y="370" text-anchor="middle" font-size="10.5">no recovery</text>
      <text class="pleg-note" x="186" y="387" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">a stuck payment stayed stuck until a support ticket</text>
      <text x="534" y="370" text-anchor="middle" font-size="10.5">reconciliation every 5 min</text>
      <text class="pleg-note" x="534" y="387" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">Hangfire backstop finds Settled + FulfilledDate null</text>
      <text x="360" y="376" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">vs</text>
    </g>

    <text x="360" y="426" text-anchor="middle" font-size="9.5" fill="var(--color-q0,#5fc9bf)">correctness by construction &#8212; not by patch</text>
    <text class="pleg-hint" x="708" y="30" text-anchor="end" font-size="9" fill="var(--color-muted,#8a8f9c)">hover a row &#9656;</text>
  </g>
</svg>
