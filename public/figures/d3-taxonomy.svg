<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-labelledby="c7-title c7-desc">
  <title id="c7-title">One home per fact, keyed by document type</title>
  <desc id="c7-desc">Six kinds of knowledge on the left route to six labelled buckets on the right. A decision goes to architecture/decisions (an ADR). A future design goes to plans. A shipped bug goes to reference/audits, dated and immutable. A domain rule goes to reference/business-rules. An outage goes to reference/incidents. Module state goes to reference/modules. Each token travels along its routing line into its one matching bucket, which lights teal as the token lands. Every kind of knowledge has exactly one destination, decided by what kind of document it is — not by feature.</desc>
  <defs>
    <marker id="c7-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
    </marker>
  </defs>
  <style>
    @keyframes c7-flow {
      0%   { transform: translateX(0);     opacity: 0; }
      5%   { opacity: 1; }
      42%  { transform: translateX(346px); opacity: 1; }
      48%  { transform: translateX(346px); opacity: 0; }
      100% { transform: translateX(346px); opacity: 0; }
    }
    @keyframes c7-lite {
      0%, 36% { opacity: 0; }
      44%     { opacity: 0.95; }
      60%     { opacity: 0.95; }
      66%     { opacity: 0; }
      100%    { opacity: 0; }
    }
    .c7-flow { animation: c7-flow 7.2s ease-in-out infinite; }
    .c7-lite { animation: c7-lite 7.2s ease-in-out infinite; }
    .c7-d1 { animation-delay: 1.2s; }
    .c7-d2 { animation-delay: 2.4s; }
    .c7-d3 { animation-delay: 3.6s; }
    .c7-d4 { animation-delay: 4.8s; }
    .c7-d5 { animation-delay: 6s; }
    @media (prefers-reduced-motion: reduce) {
      .c7-flow { animation: none; opacity: 0; }
      .c7-lite { animation: none; opacity: 0; }
    }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- eyebrow -->
    <text x="450" y="28" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="var(--color-q1, #9d8cff)">ONE HOME PER FACT</text>

    <!-- column headers -->
    <text x="120" y="66" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">a kind of knowledge</text>
    <text x="706" y="66" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">its one canonical folder</text>

    <!-- ══ ROW 1 · decision → architecture/decisions ══ -->
    <rect x="36" y="90" width="168" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <text x="120" y="116" text-anchor="middle" font-size="11">a decision</text>
    <line x1="206" y1="111" x2="546" y2="111" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" stroke-dasharray="4 4" opacity="0.4" marker-end="url(#c7-ah)" />
    <rect x="548" y="90" width="316" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <rect class="c7-lite" x="548" y="90" width="316" height="42" rx="4" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0" />
    <text x="564" y="109" font-size="11">architecture/decisions</text>
    <text x="564" y="124" font-size="9.5" fill="var(--color-muted, #8a8f9c)">an ADR</text>

    <!-- ══ ROW 2 · future design → plans ══ -->
    <rect x="36" y="150" width="168" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <text x="120" y="176" text-anchor="middle" font-size="11">a future design</text>
    <line x1="206" y1="171" x2="546" y2="171" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" stroke-dasharray="4 4" opacity="0.4" marker-end="url(#c7-ah)" />
    <rect x="548" y="150" width="316" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <rect class="c7-lite c7-d1" x="548" y="150" width="316" height="42" rx="4" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0" />
    <text x="564" y="169" font-size="11">plans</text>
    <text x="564" y="184" font-size="9.5" fill="var(--color-muted, #8a8f9c)">what we will build</text>

    <!-- ══ ROW 3 · shipped bug → reference/audits ══ -->
    <rect x="36" y="210" width="168" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <text x="120" y="236" text-anchor="middle" font-size="11">a shipped bug</text>
    <line x1="206" y1="231" x2="546" y2="231" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" stroke-dasharray="4 4" opacity="0.4" marker-end="url(#c7-ah)" />
    <rect x="548" y="210" width="316" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <rect class="c7-lite c7-d2" x="548" y="210" width="316" height="42" rx="4" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0" />
    <text x="564" y="229" font-size="11">reference/audits</text>
    <text x="564" y="244" font-size="9.5" fill="var(--color-muted, #8a8f9c)">dated, immutable</text>

    <!-- ══ ROW 4 · domain rule → reference/business-rules ══ -->
    <rect x="36" y="270" width="168" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <text x="120" y="296" text-anchor="middle" font-size="11">a domain rule</text>
    <line x1="206" y1="291" x2="546" y2="291" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" stroke-dasharray="4 4" opacity="0.4" marker-end="url(#c7-ah)" />
    <rect x="548" y="270" width="316" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <rect class="c7-lite c7-d3" x="548" y="270" width="316" height="42" rx="4" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0" />
    <text x="564" y="289" font-size="11">reference/business-rules</text>
    <text x="564" y="304" font-size="9.5" fill="var(--color-muted, #8a8f9c)">domain invariants</text>

    <!-- ══ ROW 5 · outage → reference/incidents ══ -->
    <rect x="36" y="330" width="168" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <text x="120" y="356" text-anchor="middle" font-size="11">an outage</text>
    <line x1="206" y1="351" x2="546" y2="351" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" stroke-dasharray="4 4" opacity="0.4" marker-end="url(#c7-ah)" />
    <rect x="548" y="330" width="316" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <rect class="c7-lite c7-d4" x="548" y="330" width="316" height="42" rx="4" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0" />
    <text x="564" y="349" font-size="11">reference/incidents</text>
    <text x="564" y="364" font-size="9.5" fill="var(--color-muted, #8a8f9c)">outage postmortems</text>

    <!-- ══ ROW 6 · module state → reference/modules ══ -->
    <rect x="36" y="390" width="168" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <text x="120" y="416" text-anchor="middle" font-size="11">module state</text>
    <line x1="206" y1="411" x2="546" y2="411" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" stroke-dasharray="4 4" opacity="0.4" marker-end="url(#c7-ah)" />
    <rect x="548" y="390" width="316" height="42" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <rect class="c7-lite c7-d5" x="548" y="390" width="316" height="42" rx="4" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0" />
    <text x="564" y="409" font-size="11">reference/modules</text>
    <text x="564" y="424" font-size="9.5" fill="var(--color-muted, #8a8f9c)">per-module state</text>

    <!-- ── travelling tokens ── -->
    <g class="c7-flow"><circle cx="210" cy="111" r="5.5" fill="var(--color-q0, #5fc9bf)" /></g>
    <g class="c7-flow c7-d1"><circle cx="210" cy="171" r="5.5" fill="var(--color-q0, #5fc9bf)" /></g>
    <g class="c7-flow c7-d2"><circle cx="210" cy="231" r="5.5" fill="var(--color-q0, #5fc9bf)" /></g>
    <g class="c7-flow c7-d3"><circle cx="210" cy="291" r="5.5" fill="var(--color-q0, #5fc9bf)" /></g>
    <g class="c7-flow c7-d4"><circle cx="210" cy="351" r="5.5" fill="var(--color-q0, #5fc9bf)" /></g>
    <g class="c7-flow c7-d5"><circle cx="210" cy="411" r="5.5" fill="var(--color-q0, #5fc9bf)" /></g>

    <!-- caption -->
    <text x="450" y="452" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">Fig. — the destination is decided by what kind of document it is — not by feature. Every fact has one home.</text>
  </g>
</svg>
