<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="bpos1-title bpos1-desc">
  <title id="bpos1-title">Inverted knowledge distillation: a decision tree teaches the neural net</title>
  <desc id="bpos1-desc">Left to right. A small decision tree — the teacher — reads each word embedding and, from the class counts in its leaf, emits a soft, spread-out probability distribution over the 30 POS tags that is less biased by class imbalance. That distribution flows right into a much larger neural network — the student — which absorbs it. The arrow is labelled "inverted": here the small, humble model teaches the big, hungry one, the reverse of textbook distillation.</desc>
  <defs>
    <marker id="bpos1-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted,#8a8f9c)" />
    </marker>
    <marker id="bpos1-ah-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-q0,#5fc9bf)" />
    </marker>
  </defs>
  <style>
    @keyframes bpos1-flow {
      0%   { transform: translateX(0);    opacity: 0; }
      12%  { opacity: 1; }
      70%  { transform: translateX(126px); opacity: 1; }
      84%  { transform: translateX(126px); opacity: 0; }
      100% { transform: translateX(126px); opacity: 0; }
    }
    @keyframes bpos1-absorb { 0%,54% { opacity: 0.08; } 76% { opacity: 0.8; } 94% { opacity: 0.08; } 100% { opacity: 0.08; } }
    @keyframes bpos1-shine  { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
    .bpos1-flow { animation: bpos1-flow 4.6s ease-in-out infinite; }
    .bpos1-d1 { animation-delay: 1.55s; }
    .bpos1-d2 { animation-delay: 3.1s; }
    .bpos1-absorb { animation: bpos1-absorb 4.6s ease-in-out infinite; }
    .bpos1-shine { animation: bpos1-shine 3.3s ease-in-out infinite; }
    /* interactive (zero-JS): hover or keyboard-focus a node to isolate it */
    .bpos1-col{ cursor:pointer; transition:opacity .2s ease; }
    .bpos1-col:focus{ outline:none; }
    .bpos1-hit{ fill:transparent; }
    .bpos1-note{ opacity:0; transition:opacity .18s ease; pointer-events:none; }
    svg:hover .bpos1-col:not(:hover),
    svg:focus-within .bpos1-col:not(:focus-within){ opacity:.35; }
    .bpos1-col:hover .bpos1-rect,
    .bpos1-col:focus-within .bpos1-rect{ stroke:var(--color-ink,#e9e7e0); stroke-width:2.4; }
    .bpos1-col:hover .bpos1-note,
    .bpos1-col:focus-within .bpos1-note{ opacity:1; }
    .bpos1-hint{ opacity:.6; }
    svg:hover .bpos1-hint,
    svg:focus-within .bpos1-hint{ opacity:0; transition:opacity .2s ease; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} }
  </style>
  <g style="font-family: var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)" font-size="12">

    <text x="320" y="26" text-anchor="middle" font-size="11" letter-spacing="1.4" fill="var(--color-q1,#9d8cff)">INVERTED DISTILLATION &#183; THE SMALL MODEL TEACHES THE BIG ONE</text>
    <text class="bpos1-hint" x="614" y="44" text-anchor="end" font-size="9" fill="var(--color-muted,#8a8f9c)">hover &#9656;</text>

    <text x="86"  y="56" text-anchor="middle" font-size="9.5" fill="var(--color-muted,#8a8f9c)">1 &#183; teacher (small)</text>
    <text x="320" y="56" text-anchor="middle" font-size="9.5" fill="var(--color-muted,#8a8f9c)">2 &#183; leaf-count distribution</text>
    <text x="556" y="56" text-anchor="middle" font-size="9.5" fill="var(--color-muted,#8a8f9c)">3 &#183; student (large)</text>

    <!-- teacher: decision tree (focusable) -->
    <g class="bpos1-col" tabindex="0" role="group" aria-label="Teacher: decision tree, test macro-F1 0.46">
    <title>decision-tree teacher &#183; macro-F1 0.46</title>
    <rect class="bpos1-hit" x="8" y="112" width="160" height="188" />
    <rect class="bpos1-rect" x="26" y="120" width="120" height="150" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-q1,#9d8cff)" stroke-width="1.8" />
    <text x="86" y="142" text-anchor="middle" font-size="11" fill="var(--color-q1,#9d8cff)">decision tree</text>
    <!-- little tree glyph -->
    <circle cx="86" cy="166" r="7" fill="none" stroke="var(--color-q1,#9d8cff)" stroke-width="1.6" />
    <line x1="80" y1="172" x2="60" y2="196" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4" />
    <line x1="92" y1="172" x2="112" y2="196" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4" />
    <circle cx="60" cy="202" r="6" fill="none" stroke="var(--color-q1,#9d8cff)" stroke-width="1.5" />
    <circle cx="112" cy="202" r="6" fill="var(--color-q1,#9d8cff)" fill-opacity="0.25" stroke="var(--color-q1,#9d8cff)" stroke-width="1.5" />
    <line x1="55" y1="208" x2="46" y2="226" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.2" />
    <line x1="65" y1="208" x2="74" y2="226" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.2" />
    <text x="86" y="252" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">less biased by</text>
    <text x="86" y="263" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">class imbalance</text>
    <text class="bpos1-note" x="86" y="286" text-anchor="middle" font-size="8.5" fill="var(--color-q1,#9d8cff)">decision-tree teacher</text>
    <text class="bpos1-note" x="86" y="297" text-anchor="middle" font-size="8.5" fill="var(--color-q1,#9d8cff)">macro-F1 0.46</text>
    </g>

    <line x1="148" y1="195" x2="176" y2="195" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.5" opacity="0.7" marker-end="url(#bpos1-ah)" />

    <!-- leaf-count distribution panel -->
    <rect x="178" y="118" width="204" height="154" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.8" />
    <text x="280" y="138" text-anchor="middle" font-size="10.5" fill="var(--color-q0,#5fc9bf)">leaf class-counts &#8594; P(tag)</text>
    <line x1="192" y1="248" x2="370" y2="248" stroke="var(--color-muted,#8a8f9c)" stroke-width="1" opacity="0.4" />
    <!-- soft, spread bars (balanced dark knowledge) -->
    <g class="bpos1-shine" fill="var(--color-q0,#5fc9bf)" fill-opacity="0.85">
      <rect x="196" y="196" width="15" height="52" rx="1.5" />
      <rect x="217" y="206" width="15" height="42" rx="1.5" />
      <rect x="238" y="200" width="15" height="48" rx="1.5" />
      <rect x="259" y="214" width="15" height="34" rx="1.5" />
      <rect x="280" y="210" width="15" height="38" rx="1.5" />
      <rect x="301" y="220" width="15" height="28" rx="1.5" />
      <rect x="322" y="216" width="15" height="32" rx="1.5" />
      <rect x="343" y="224" width="15" height="24" rx="1.5" />
    </g>
    <text x="280" y="264" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">spread out &#8212; not collapsed onto NC</text>

    <!-- inverted arrow -> student (focusable "soft targets" link) -->
    <g class="bpos1-col" tabindex="0" role="group" aria-label="Soft targets: normalized leaf class-counts passed to the student">
    <title>soft targets = normalized leaf class-counts</title>
    <rect class="bpos1-hit" x="384" y="158" width="44" height="40" />
    <line class="bpos1-rect" x1="384" y1="180" x2="426" y2="180" stroke="var(--color-q0,#5fc9bf)" stroke-width="2.4" marker-end="url(#bpos1-ah-teal)" />
    <text x="405" y="170" text-anchor="middle" font-size="8.5" fill="var(--color-q0,#5fc9bf)">soft targets</text>
    <text class="bpos1-note" x="405" y="92" text-anchor="middle" font-size="8.5" fill="var(--color-q0,#5fc9bf)">soft targets = normalized leaf class-counts</text>
    </g>

    <!-- student: neural net (bigger, focusable) -->
    <g class="bpos1-col" tabindex="0" role="group" aria-label="Student: neural network, 768 to 1024 to 30 dimensions">
    <title>neural student &#183; 768&#8594;1024&#8594;30</title>
    <rect class="bpos1-hit" x="430" y="98" width="190" height="212" />
    <rect class="bpos1-rect" x="430" y="104" width="184" height="182" rx="7" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="2" />
    <rect class="bpos1-absorb" x="430" y="104" width="184" height="182" rx="7" fill="var(--color-q0,#5fc9bf)" stroke="none" opacity="0.08" />
    <text x="522" y="128" text-anchor="middle" font-size="11" fill="var(--color-q0,#5fc9bf)">neural network</text>
    <text x="522" y="144" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">768 &#8594; 1024 &#8594; 30</text>
    <!-- dense layer dots -->
    <g fill="var(--color-q0,#5fc9bf)" fill-opacity="0.55">
      <circle cx="466" cy="176" r="4" /><circle cx="466" cy="198" r="4" /><circle cx="466" cy="220" r="4" /><circle cx="466" cy="242" r="4" />
      <circle cx="522" cy="166" r="4" /><circle cx="522" cy="186" r="4" /><circle cx="522" cy="206" r="4" /><circle cx="522" cy="226" r="4" /><circle cx="522" cy="246" r="4" />
      <circle cx="578" cy="188" r="4" /><circle cx="578" cy="210" r="4" /><circle cx="578" cy="232" r="4" />
    </g>
    <g stroke="var(--color-muted,#8a8f9c)" stroke-width="0.7" opacity="0.4">
      <line x1="466" y1="176" x2="522" y2="166" /><line x1="466" y1="198" x2="522" y2="206" /><line x1="466" y1="220" x2="522" y2="226" /><line x1="466" y1="242" x2="522" y2="246" />
      <line x1="522" y1="186" x2="578" y2="210" /><line x1="522" y1="226" x2="578" y2="232" /><line x1="522" y1="166" x2="578" y2="188" />
    </g>
    <text x="522" y="276" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">hungry, high-capacity student</text>
    <text class="bpos1-note" x="522" y="300" text-anchor="middle" font-size="8.5" fill="var(--color-q0,#5fc9bf)">neural student &#183; 768&#8594;1024&#8594;30</text>
    </g>

    <!-- travelling particles -->
    <g class="bpos1-flow"><circle cx="392" cy="180" r="4" fill="var(--color-q0,#5fc9bf)" /></g>
    <g class="bpos1-flow bpos1-d1"><circle cx="392" cy="180" r="4" fill="var(--color-q0,#5fc9bf)" /></g>
    <g class="bpos1-flow bpos1-d2"><circle cx="392" cy="180" r="4" fill="var(--color-q0,#5fc9bf)" /></g>

    <text x="320" y="316" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">Textbook distillation shrinks a big teacher into a small student. We ran it backwards: the tree&#8217;s</text>
    <text x="320" y="332" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">leaf distribution is less warped by imbalance, so the weak model hands its balance to the strong one.</text>
  </g>
</svg>
