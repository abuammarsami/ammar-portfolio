<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="mocr-title mocr-desc">
  <title id="mocr-title">Per-head results on the held-out test set</title>
  <desc id="mocr-desc">Three horizontal bars show the multi-output model's test performance: age achieves an R-squared of 0.81 (mean absolute error about 6.8 years), gender classification reaches 94.8 percent validation accuracy, and race classification reaches 87 percent overall accuracy. A red callout flags the honest caveat: within the race head, the catch-all others class has recall of only 0.37, so the model misses nearly two-thirds of those faces despite the high headline accuracy.</desc>
  <style>
    @keyframes mocr-age { from{width:0} to{width:257px} }
    @keyframes mocr-gen { from{width:0} to{width:299px} }
    @keyframes mocr-rac { from{width:0} to{width:275px} }
    @keyframes mocr-warn { 0%,100%{opacity:0.55} 50%{opacity:1} }
    .mocr-age{animation:mocr-age 1.4s ease-out forwards}
    .mocr-gen{animation:mocr-gen 1.4s ease-out 0.18s forwards;width:0}
    .mocr-rac{animation:mocr-rac 1.4s ease-out 0.36s forwards;width:0}
    .mocr-warn{animation:mocr-warn 2.6s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} .mocr-age{width:257px} .mocr-gen{width:299px} .mocr-rac{width:275px} .mocr-warn{opacity:0.9} }
  </style>
  <g style="font-family: var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)" font-size="12">

    <text x="320" y="26" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="var(--color-q1,#9d8cff)">WHAT EACH HEAD SCORED</text>

    <!-- track baseline x from 120 to 436 (width 316 = 100%) -->
    <!-- age -->
    <text x="24" y="76" font-size="11">age</text>
    <text x="24" y="90" font-size="9" fill="var(--color-muted,#8a8f9c)">regression</text>
    <rect x="120" y="60" width="316" height="22" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1" opacity="0.5" />
    <rect class="mocr-age" x="120" y="60" height="22" rx="4" fill="var(--color-q0,#5fc9bf)" opacity="0.85" />
    <text x="448" y="76" font-size="11" fill="var(--color-q0,#5fc9bf)">R2 0.81</text>
    <text x="524" y="76" font-size="10" fill="var(--color-muted,#8a8f9c)">MAE ~6.8yr</text>

    <!-- gender -->
    <text x="24" y="126" font-size="11">gender</text>
    <text x="24" y="140" font-size="9" fill="var(--color-muted,#8a8f9c)">2-class</text>
    <rect x="120" y="110" width="316" height="22" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1" opacity="0.5" />
    <rect class="mocr-gen" x="120" y="110" height="22" rx="4" fill="var(--color-q0,#5fc9bf)" opacity="0.85" />
    <text x="448" y="126" font-size="11" fill="var(--color-q0,#5fc9bf)">94.8%</text>
    <text x="524" y="126" font-size="10" fill="var(--color-muted,#8a8f9c)">val acc</text>

    <!-- race -->
    <text x="24" y="176" font-size="11">race</text>
    <text x="24" y="190" font-size="9" fill="var(--color-muted,#8a8f9c)">5-class</text>
    <rect x="120" y="160" width="316" height="22" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1" opacity="0.5" />
    <rect class="mocr-rac" x="120" y="160" height="22" rx="4" fill="var(--color-q1,#9d8cff)" opacity="0.85" />
    <text x="448" y="176" font-size="11" fill="var(--color-q1,#9d8cff)">87%</text>
    <text x="524" y="176" font-size="10" fill="var(--color-muted,#8a8f9c)">test acc</text>

    <!-- honest caveat callout -->
    <rect x="24" y="214" width="592" height="66" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-error,#ef4444)" stroke-width="1.4" opacity="0.9" />
    <circle class="mocr-warn" cx="48" cy="247" r="9" fill="none" stroke="var(--color-error,#ef4444)" stroke-width="1.6" />
    <text x="48" y="251" text-anchor="middle" font-size="12" fill="var(--color-error,#ef4444)">!</text>
    <text x="70" y="240" font-size="10.5" fill="var(--color-ink,#e9e7e0)">The 87% hides a fairness failure: the catch-all "others" class has</text>
    <text x="70" y="257" font-size="10.5" fill="var(--color-error,#ef4444)">recall 0.37</text>
    <text x="142" y="257" font-size="10.5" fill="var(--color-ink,#e9e7e0)">- the model misses ~2/3 of those faces (macro-F1 0.81 &lt; 0.87 acc).</text>
    <text x="70" y="273" font-size="9.5" fill="var(--color-muted,#8a8f9c)">487 examples, no coherent visual prototype - a bad taxonomy, not a tunable bug.</text>

    <text x="320" y="308" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">Real numbers from the notebook: R2 0.8143, race classification_report on 7,040 test faces.</text>
  </g>
</svg>
