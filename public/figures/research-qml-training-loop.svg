<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 372" role="img" aria-labelledby="qloop-t qloop-d">
  <title id="qloop-t">The hybrid quantum-classical training loop</title>
  <desc id="qloop-d">A cycle. Along the top the forward pass runs left to right: classical data is encoded into qubit rotations, a parameterized variational circuit transforms the quantum state, a measurement reads out class scores, and a loss is computed. Below, a classical optimizer computes the gradient by the parameter-shift rule and sends an emphasized teal arrow back up into the variational circuit, updating its parameters. A token travels the whole loop. Hover or focus a node to isolate it and read its role.</desc>
  <defs>
    <marker id="qloop-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted,#8a8f9c)"/>
    </marker>
    <marker id="qloop-ah-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-q0,#5fc9bf)"/>
    </marker>
  </defs>
  <style>
    @keyframes qloop-orbit {
      0%{transform:translate(0,0);opacity:0} 3%{opacity:1}
      34%{transform:translate(468px,0)} 46%{transform:translate(468px,150px)}
      64%{transform:translate(234px,150px)} 88%{transform:translate(234px,34px);opacity:1}
      95%{transform:translate(234px,34px);opacity:0} 100%{opacity:0}
    }
    @keyframes qloop-glow { 0%,100%{opacity:.3} 50%{opacity:.82} }
    @keyframes qloop-pulse{ 0%,58%{opacity:0} 76%{opacity:.7} 100%{opacity:0} }
    .qloop-orbit{ animation:qloop-orbit 7s ease-in-out infinite; }
    .qloop-halo { animation:qloop-glow 3.6s ease-in-out infinite; }
    .qloop-pulse{ animation:qloop-pulse 7s ease-in-out infinite; }
    /* interactive (zero-JS): hover or keyboard-focus a node to isolate it */
    .qloop-stage{ cursor:pointer; transition:opacity .2s ease; }
    .qloop-stage:focus{ outline:none; }
    .qloop-hit{ fill:transparent; }
    svg:hover .qloop-stage:not(:hover),
    svg:focus-within .qloop-stage:not(:focus-within){ opacity:.3; }
    .qloop-frame{ fill:none; stroke:none; transition:stroke .18s ease; }
    .qloop-stage:hover .qloop-frame,
    .qloop-stage:focus-within .qloop-frame{ stroke:var(--color-ink,#e9e7e0); stroke-width:1.5; }
    .qloop-note{ opacity:0; transition:opacity .18s ease; }
    .qloop-stage:hover .qloop-note,
    .qloop-stage:focus-within .qloop-note{ opacity:1; }
    .qloop-hint{ opacity:.6; }
    svg:hover .qloop-hint,
    svg:focus-within .qloop-hint{ opacity:0; transition:opacity .2s ease; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} .qloop-orbit{opacity:0!important} .qloop-halo{opacity:.5!important} }
  </style>
  <g style="font-family:var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)" font-size="12">
    <text x="320" y="26" text-anchor="middle" font-size="11" letter-spacing="1.4" fill="var(--color-q1,#9d8cff)">THE HYBRID QUANTUM&#8211;CLASSICAL TRAINING LOOP</text>
    <text x="320" y="52" text-anchor="middle" font-size="10" fill="var(--color-muted,#8a8f9c)">forward pass &#183; classical &#8594; quantum device &#8594; classical</text>

    <!-- shared connectors (not part of any single node) -->
    <line x1="136" y1="100" x2="164" y2="100" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4" marker-end="url(#qloop-ah)"/>
    <line x1="302" y1="100" x2="330" y2="100" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4" marker-end="url(#qloop-ah)"/>
    <line x1="450" y1="100" x2="478" y2="100" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4" marker-end="url(#qloop-ah)"/>
    <polyline points="539,128 539,244 434,244" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4" marker-end="url(#qloop-ah)"/>
    <line x1="234" y1="220" x2="234" y2="130" stroke="var(--color-q0,#5fc9bf)" stroke-width="3" marker-end="url(#qloop-ah-teal)"/>
    <line class="qloop-pulse" x1="234" y1="220" x2="234" y2="130" stroke="var(--color-q0,#5fc9bf)" stroke-width="6" opacity="0"/>
    <text x="248" y="166" font-size="10" fill="var(--color-q0,#5fc9bf)">update &#952;</text>
    <text x="248" y="181" font-size="8.5" fill="var(--color-muted,#8a8f9c)">&#8212; this is what learns</text>

    <!-- NODE: encode -->
    <g class="qloop-stage" tabindex="0" role="group" aria-label="Encode node: classical data mapped into qubit rotations">
      <title>encode &#8212; classical pixels become qubit rotation angles</title>
      <rect class="qloop-frame" x="14" y="68" width="126" height="64" rx="7"/>
      <rect class="qloop-hit" x="14" y="68" width="126" height="64"/>
      <rect x="18" y="72" width="118" height="56" rx="5" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.5"/>
      <text x="77" y="96" text-anchor="middle" font-size="11">encode</text>
      <text x="77" y="114" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">data &#8594; state</text>
      <text class="qloop-note" x="320" y="356" text-anchor="middle" font-size="10" fill="var(--color-q0,#5fc9bf)">encode &#183; classical pixels &#8594; qubit rotation angles</text>
    </g>

    <!-- NODE: variational (the learner) -->
    <g class="qloop-stage" tabindex="0" role="group" aria-label="Variational node: the parameterized circuit, the only trained block">
      <title>variational &#8212; parameterized circuit, the only block that trains</title>
      <rect class="qloop-frame" x="162" y="68" width="144" height="64" rx="7"/>
      <rect class="qloop-hit" x="162" y="68" width="144" height="64"/>
      <rect x="166" y="72" width="136" height="56" rx="5" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="2"/>
      <rect class="qloop-halo" x="166" y="72" width="136" height="56" rx="5" fill="none" stroke="var(--color-q0,#5fc9bf)" stroke-width="2" opacity="0.4"/>
      <text x="234" y="96" text-anchor="middle" font-size="11" fill="var(--color-q0,#5fc9bf)">variational</text>
      <text x="234" y="114" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">parameterized &#952;</text>
      <text class="qloop-note" x="320" y="356" text-anchor="middle" font-size="10" fill="var(--color-q0,#5fc9bf)">variational &#183; trainable &#952;, the only learned block</text>
    </g>

    <!-- NODE: measure -->
    <g class="qloop-stage" tabindex="0" role="group" aria-label="Measure node: quantum state read out as class scores">
      <title>measure &#8212; the quantum state is read out as class scores</title>
      <rect class="qloop-frame" x="328" y="68" width="126" height="64" rx="7"/>
      <rect class="qloop-hit" x="328" y="68" width="126" height="64"/>
      <rect x="332" y="72" width="118" height="56" rx="5" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.5"/>
      <text x="391" y="96" text-anchor="middle" font-size="11">measure</text>
      <text x="391" y="114" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">class scores</text>
      <text class="qloop-note" x="320" y="356" text-anchor="middle" font-size="10" fill="var(--color-q0,#5fc9bf)">measure &#183; quantum state &#8594; class-score logits</text>
    </g>

    <!-- NODE: loss -->
    <g class="qloop-stage" tabindex="0" role="group" aria-label="Loss node: cross-entropy against the true label">
      <title>loss &#8212; cross-entropy between scores and the true label</title>
      <rect class="qloop-frame" x="476" y="68" width="126" height="64" rx="7"/>
      <rect class="qloop-hit" x="476" y="68" width="126" height="64"/>
      <rect x="480" y="72" width="118" height="56" rx="5" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.5"/>
      <text x="539" y="96" text-anchor="middle" font-size="11">loss</text>
      <text x="539" y="114" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">cross-entropy</text>
      <text class="qloop-note" x="320" y="356" text-anchor="middle" font-size="10" fill="var(--color-muted,#8a8f9c)">loss &#183; cross-entropy of scores vs the true label</text>
    </g>

    <!-- NODE: optimizer -->
    <g class="qloop-stage" tabindex="0" role="group" aria-label="Optimizer node: parameter-shift gradient produces new parameters">
      <title>classical optimizer &#8212; parameter-shift gradient produces new &#952;</title>
      <rect class="qloop-frame" x="192" y="216" width="246" height="66" rx="8"/>
      <rect class="qloop-hit" x="192" y="216" width="246" height="66"/>
      <rect x="196" y="220" width="238" height="58" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.5"/>
      <text x="315" y="246" text-anchor="middle" font-size="11">classical optimizer</text>
      <text x="315" y="264" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">&#8711; via parameter-shift &#183; SGD / Adam</text>
      <text class="qloop-note" x="320" y="356" text-anchor="middle" font-size="10" fill="var(--color-q0,#5fc9bf)">optimizer &#183; parameter-shift gradient &#8594; new &#952;</text>
    </g>

    <!-- travelling token -->
    <g class="qloop-orbit" opacity="0"><circle cx="77" cy="100" r="5" fill="var(--color-q0,#5fc9bf)"/></g>

    <!-- interaction hint (fades once the reader hovers the figure) -->
    <text class="qloop-hint" x="620" y="26" text-anchor="end" font-size="9" fill="var(--color-muted,#8a8f9c)">hover a node &#9656;</text>

    <text x="320" y="320" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">The forward pass detours through a quantum circuit; the parameter-shift rule turns a measurement</text>
    <text x="320" y="336" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">into an exact gradient, so an ordinary classical optimizer can update the circuit&#8217;s angles and loop.</text>
  </g>
</svg>
