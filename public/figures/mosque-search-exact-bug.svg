<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 372" width="880" height="372" role="img" aria-labelledby="mseb-title">
  <title id="mseb-title">The exact-match ranking bug and its fix. Before: results ordered by score alone, several mosques all scored 100, and the exact-name match for Islamic Center of Cedar Rapids fell below the top-10 cutoff. After: a word-boundary exact hit on any field is made the primary sort key, so the exact match floats to the top regardless of score ties</title>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="12">

    <!-- ===================== BEFORE ===================== -->
    <text x="30" y="40" font-size="13" fill="var(--color-muted, #8a8f9c)">before — ordered by score only</text>

    <g>
      <rect x="30" y="56" width="380" height="30" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" />
      <text x="44" y="75">Masjid An-Noor</text>
      <text x="396" y="75" text-anchor="end" fill="var(--color-muted, #8a8f9c)">100</text>

      <rect x="30" y="92" width="380" height="30" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" />
      <text x="44" y="111">Islamic Center of Columbus</text>
      <text x="396" y="111" text-anchor="end" fill="var(--color-muted, #8a8f9c)">100</text>

      <rect x="30" y="128" width="380" height="30" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" />
      <text x="44" y="147">Islamic Center of Cedar Falls</text>
      <text x="396" y="147" text-anchor="end" fill="var(--color-muted, #8a8f9c)">100</text>

      <text x="44" y="180" fill="var(--color-muted, #8a8f9c)">… seven more at 100 …</text>

      <!-- top-10 cutoff -->
      <line x1="30" y1="196" x2="410" y2="196" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" stroke-dasharray="6 4" />
      <text x="410" y="192" text-anchor="end" font-size="10.5" fill="var(--color-muted, #8a8f9c)">top-10 cutoff</text>

      <!-- the buried exact match -->
      <rect x="30" y="206" width="380" height="34" rx="2" fill="none" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.85" />
      <text x="44" y="227" fill="var(--color-muted, #8a8f9c)">Islamic Center of Cedar Rapids</text>
      <text x="396" y="227" text-anchor="end" fill="var(--color-muted, #8a8f9c)">100 ✕</text>
      <text x="30" y="262" font-size="10.5" fill="var(--color-muted, #8a8f9c)">exact name — dropped off the list</text>
    </g>

    <!-- arrow between panels -->
    <line x1="430" y1="150" x2="470" y2="150" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" marker-end="url(#mseb-ah)" />
    <defs>
      <marker id="mseb-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
      </marker>
    </defs>

    <!-- ===================== AFTER ===================== -->
    <text x="490" y="40" font-size="13" fill="var(--color-q0, #5fc9bf)">after — exact word-boundary hit floats first</text>

    <g>
      <!-- floated exact match -->
      <rect x="490" y="56" width="380" height="34" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2.5" />
      <text x="504" y="77">Islamic Center of Cedar Rapids</text>
      <text x="856" y="77" text-anchor="end" fill="var(--color-q0, #5fc9bf)">exact ★</text>

      <rect x="490" y="96" width="380" height="30" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" />
      <text x="504" y="115">Masjid An-Noor</text>
      <text x="856" y="115" text-anchor="end" fill="var(--color-muted, #8a8f9c)">100</text>

      <rect x="490" y="132" width="380" height="30" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" />
      <text x="504" y="151">Islamic Center of Columbus</text>
      <text x="856" y="151" text-anchor="end" fill="var(--color-muted, #8a8f9c)">100</text>

      <rect x="490" y="168" width="380" height="30" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" />
      <text x="504" y="187">Islamic Center of Cedar Falls</text>
      <text x="856" y="187" text-anchor="end" fill="var(--color-muted, #8a8f9c)">100</text>

      <text x="504" y="220" fill="var(--color-muted, #8a8f9c)">… the rest by score, within top 10 …</text>

      <text x="490" y="262" font-size="10.5" fill="var(--color-muted, #8a8f9c)">OrderByDescending(IsExactMatch).ThenByDescending(Score)</text>
    </g>

    <!-- footer -->
    <text x="440" y="344" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">a search engine must honor certainty: an exact hit outranks a fuzzy tie by construction</text>
  </g>
</svg>
