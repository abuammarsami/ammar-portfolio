<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400" role="img" aria-labelledby="r3-title r3-desc">
  <title id="r3-title">Anomaly detection, then distillation into a deployable student</title>
  <desc id="r3-desc">On the left, a feature-space panel: a tight teal boundary encloses a dense cluster of normal traffic points. A few attack points fall outside the boundary and pulse as they are flagged; one carries a caught ring and a novel-attack label. On the right, that detector is the teacher; an emphasized teal distillation arrow runs down into a smaller student box marked deployable, which lights up as it receives the transfer. Learn the shape of normal so novel attacks stand out, then compress the detector to something you can actually run.</desc>
  <defs>
    <marker id="r3-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
    </marker>
    <marker id="r3-ah-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-q0, #5fc9bf)" />
    </marker>
  </defs>
  <style>
    @keyframes r3-pulse { 0%, 100% { transform: scale(1); opacity: 0.35; } 50% { transform: scale(2.4); opacity: 0; } }
    @keyframes r3-blink { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes r3-glow  { 0%, 100% { opacity: 0.28; } 50% { opacity: 0.7; } }
    @keyframes r3-distill {
      0%   { transform: translateY(0);    opacity: 0; }
      12%  { opacity: 1; }
      72%  { transform: translateY(60px); opacity: 1; }
      84%  { transform: translateY(60px); opacity: 0; }
      100% { transform: translateY(60px); opacity: 0; }
    }
    @keyframes r3-absorb { 0%, 58% { opacity: 0.08; } 80% { opacity: 0.8; } 96% { opacity: 0.08; } 100% { opacity: 0.08; } }
    .r3-pulse { animation: r3-pulse 3.4s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .r3-p1 { animation-delay: 0.5s; }
    .r3-p2 { animation-delay: 1.4s; }
    .r3-p3 { animation-delay: 2.1s; }
    .r3-blink { animation: r3-blink 3.4s ease-in-out infinite; }
    .r3-halo  { animation: r3-glow 3.8s ease-in-out infinite; }
    .r3-distill { animation: r3-distill 4.2s ease-in-out infinite; }
    .r3-absorb  { animation: r3-absorb 4.2s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .r3-pulse { animation: none; opacity: 0.4; transform: none; }
      .r3-blink { animation: none; opacity: 1; }
      .r3-halo  { animation: none; opacity: 0.5; }
      .r3-distill { animation: none; opacity: 0; }
      .r3-absorb  { animation: none; opacity: 0.5; }
    }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- eyebrow -->
    <text x="440" y="30" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="var(--color-q1, #9d8cff)">LEARN NORMAL &#183; FLAG THE REST &#183; THEN DISTILL</text>

    <!-- ── LEFT · feature-space panel ── -->
    <text x="236" y="66" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">feature space &#8212; a learned model of &#8220;normal&#8221;</text>
    <rect x="36" y="78" width="400" height="228" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />

    <!-- normal boundary (teal blob) -->
    <path class="r3-halo" d="M 150 130 C 112 145, 104 205, 140 238 C 172 268, 258 266, 296 236 C 330 209, 328 158, 288 138 C 248 118, 186 116, 150 130 Z"
          fill="none" stroke="var(--color-q0, #5fc9bf)" stroke-width="5" opacity="0.35" />
    <path d="M 150 130 C 112 145, 104 205, 140 238 C 172 268, 258 266, 296 236 C 330 209, 328 158, 288 138 C 248 118, 186 116, 150 130 Z"
          fill="var(--color-q0, #5fc9bf)" fill-opacity="0.08" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="212" y="196" text-anchor="middle" font-size="9" fill="var(--color-q0, #5fc9bf)" opacity="0.85">normal (BENIGN 80%)</text>

    <!-- normal points inside -->
    <g fill="var(--color-muted, #8a8f9c)">
      <circle cx="168" cy="158" r="3" /><circle cx="196" cy="146" r="3" /><circle cx="226" cy="152" r="3" />
      <circle cx="256" cy="160" r="3" /><circle cx="152" cy="184" r="3" /><circle cx="182" cy="176" r="3" />
      <circle cx="238" cy="178" r="3" /><circle cx="278" cy="182" r="3" /><circle cx="162" cy="214" r="3" />
      <circle cx="200" cy="220" r="3" /><circle cx="236" cy="214" r="3" /><circle cx="272" cy="212" r="3" />
      <circle cx="210" cy="240" r="3" /><circle cx="184" cy="204" r="3" /><circle cx="252" cy="234" r="3" />
    </g>

    <!-- outlier attack points (outside boundary) with pulsing rings -->
    <!-- outlier A -->
    <g><circle class="r3-pulse r3-p1" cx="368" cy="118" r="6" fill="var(--color-error, #ef4444)" fill-opacity="0.5" />
       <circle cx="368" cy="118" r="4" fill="var(--color-error, #ef4444)" /></g>
    <!-- outlier B -->
    <g><circle class="r3-pulse r3-p2" cx="96" cy="152" r="6" fill="var(--color-error, #ef4444)" fill-opacity="0.5" />
       <circle cx="96" cy="152" r="4" fill="var(--color-error, #ef4444)" /></g>
    <!-- outlier C -->
    <g><circle class="r3-pulse r3-p3" cx="122" cy="270" r="6" fill="var(--color-error, #ef4444)" fill-opacity="0.5" />
       <circle cx="122" cy="270" r="4" fill="var(--color-error, #ef4444)" /></g>

    <!-- caught outlier (flagged) -->
    <g><circle class="r3-pulse" cx="352" cy="256" r="7" fill="var(--color-error, #ef4444)" fill-opacity="0.55" />
       <circle class="r3-blink" cx="352" cy="256" r="9" fill="none" stroke="var(--color-error, #ef4444)" stroke-width="1.6" />
       <circle cx="352" cy="256" r="4.5" fill="var(--color-error, #ef4444)" /></g>
    <text x="352" y="284" text-anchor="middle" font-size="9" fill="var(--color-error, #ef4444)">novel attack &#183; flagged</text>

    <!-- ── connector: detector → teacher ── -->
    <line x1="438" y1="150" x2="556" y2="150" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" opacity="0.7" marker-end="url(#r3-ah)" />
    <text x="497" y="140" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">the detector</text>

    <!-- ── RIGHT · teacher → student distillation ── -->
    <rect x="558" y="116" width="204" height="70" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="660" y="146" text-anchor="middle" font-size="12">teacher</text>
    <text x="660" y="165" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">strong detector</text>

    <!-- emphasized distill arrow -->
    <line x1="660" y1="188" x2="660" y2="238" stroke="var(--color-q0, #5fc9bf)" stroke-width="3" marker-end="url(#r3-ah-teal)" />
    <text x="674" y="216" font-size="9.5" fill="var(--color-q0, #5fc9bf)">distill</text>

    <!-- distillation token -->
    <g class="r3-distill" opacity="0"><circle cx="660" cy="190" r="4.5" fill="var(--color-q0, #5fc9bf)" /></g>

    <!-- student (smaller = compressed) -->
    <rect x="592" y="240" width="136" height="58" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <rect class="r3-absorb" x="592" y="240" width="136" height="58" rx="6" fill="var(--color-q0, #5fc9bf)" stroke="none" opacity="0.08" />
    <text x="660" y="266" text-anchor="middle" font-size="11">student</text>
    <text x="660" y="284" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">deployable</text>

    <!-- legend -->
    <circle cx="576" cy="322" r="4" fill="var(--color-muted, #8a8f9c)" />
    <text x="586" y="326" font-size="9.5" fill="var(--color-muted, #8a8f9c)">normal</text>
    <circle cx="648" cy="322" r="4" fill="var(--color-error, #ef4444)" />
    <text x="658" y="326" font-size="9.5" fill="var(--color-muted, #8a8f9c)">anomaly / attack</text>

    <!-- caption -->
    <text x="440" y="356" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">Fig. &#8212; the model learns the tight region of normal traffic; novel attacks fall outside it and are</text>
    <text x="440" y="372" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">flagged, then knowledge distillation compresses the detector into a smaller, deployable student.</text>
  </g>
</svg>
