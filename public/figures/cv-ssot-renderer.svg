<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" role="img" aria-labelledby="csr-t csr-d">
  <title id="csr-t">One server-side renderer is the single source of truth for the CV</title>
  <desc id="csr-d">On the left, four structured profile domains: academic qualifications, employment history, skills and languages, and projects and theses. They feed one aggregation query, dbo.UserCvDataGetByUserId, which returns the profile header plus the four lists in five result sets in a single round trip. That payload goes into one server-side QuestPDF generator behind an ICvDocumentGenerator interface — a thin dispatcher over a shared CvRenderModel that derives the render-ready view once, a CvTheme palette table, and font-safe CvComponents, dispatching to one of six ICvTemplate classes. On the right, both the web app and the Flutter app call the same generator and receive byte-identical PDFs, so a design has exactly one definition and no client ever re-renders anything. Hover or focus any node to read it.</desc>
  <style>
    .csr-node{ cursor:pointer; transition:opacity .2s ease; }
    .csr-node:focus{ outline:none; }
    .csr-hit{ fill:transparent; }
    svg:hover .csr-node:not(:hover),
    svg:focus-within .csr-node:not(:focus-within){ opacity:.3; }
    .csr-box{ transition:stroke-width .2s ease; }
    .csr-node:hover .csr-box,
    .csr-node:focus-within .csr-box{ stroke-width:2.4; }
    .csr-note{ opacity:0; transition:opacity .18s ease; }
    .csr-node:hover .csr-note,
    .csr-node:focus-within .csr-note{ opacity:1; }
    .csr-hint{ opacity:.6; }
    svg:hover .csr-hint, svg:focus-within .csr-hint{ opacity:0; transition:opacity .25s ease; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} }
  </style>
  <defs>
    <marker id="csr-ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--color-q1,#9d8cff)"/>
    </marker>
  </defs>
  <g style="font-family:var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)" font-size="12">
    <text x="340" y="24" text-anchor="middle" font-size="11" letter-spacing="1.1" fill="var(--color-q1,#9d8cff)">one renderer &#183; one definition of each design &#183; no client re-renders</text>

    <!-- 4 domains -->
    <text x="96" y="52" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">4 profile domains</text>
    <g class="csr-node" tabindex="0" role="group" aria-label="Academic qualifications, one of four profile domains with full add, edit, delete">
      <title>Academic qualifications &#183; full CRUD</title>
      <rect class="csr-hit" x="20" y="60" width="152" height="36"/>
      <rect class="csr-box" x="24" y="64" width="144" height="28" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3"/>
      <text x="96" y="82" text-anchor="middle" font-size="9.5">Academic</text>
    </g>
    <g class="csr-node" tabindex="0" role="group" aria-label="Employment history, one of four profile domains with full CRUD">
      <title>Employment history &#183; full CRUD</title>
      <rect class="csr-hit" x="20" y="100" width="152" height="36"/>
      <rect class="csr-box" x="24" y="104" width="144" height="28" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3"/>
      <text x="96" y="122" text-anchor="middle" font-size="9.5">Employment</text>
    </g>
    <g class="csr-node" tabindex="0" role="group" aria-label="Skills and languages, one of four profile domains with full CRUD">
      <title>Skills / Languages &#183; full CRUD</title>
      <rect class="csr-hit" x="20" y="140" width="152" height="36"/>
      <rect class="csr-box" x="24" y="144" width="144" height="28" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3"/>
      <text x="96" y="162" text-anchor="middle" font-size="9.5">Skills / Languages</text>
    </g>
    <g class="csr-node" tabindex="0" role="group" aria-label="Projects and theses, one of four profile domains with full CRUD">
      <title>Projects / Theses &#183; full CRUD</title>
      <rect class="csr-hit" x="20" y="180" width="152" height="36"/>
      <rect class="csr-box" x="24" y="184" width="144" height="28" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3"/>
      <text x="96" y="202" text-anchor="middle" font-size="9.5">Projects / Theses</text>
    </g>

    <!-- arrows domains -> aggregation -->
    <path d="M168 78 C186 78, 190 120, 204 132" stroke="var(--color-q1,#9d8cff)" stroke-width="1.3" fill="none" marker-end="url(#csr-ah)"/>
    <path d="M168 118 H204" stroke="var(--color-q1,#9d8cff)" stroke-width="1.3" fill="none" marker-end="url(#csr-ah)"/>
    <path d="M168 158 H204" stroke="var(--color-q1,#9d8cff)" stroke-width="1.3" fill="none" marker-end="url(#csr-ah)"/>
    <path d="M168 198 C186 198, 190 156, 204 144" stroke="var(--color-q1,#9d8cff)" stroke-width="1.3" fill="none" marker-end="url(#csr-ah)"/>

    <!-- aggregation SP -->
    <g class="csr-node" tabindex="0" role="group" aria-label="One aggregation query, dbo.UserCvDataGetByUserId, returns the header plus four lists in five result sets in one round trip, feeding both preview and generator">
      <title>dbo.UserCvDataGetByUserId &#183; 5 result sets, one round trip</title>
      <rect class="csr-hit" x="204" y="104" width="150" height="72"/>
      <rect class="csr-box" x="208" y="108" width="142" height="64" rx="8" fill="var(--color-surface,#12151d)" stroke="var(--color-q1,#9d8cff)" stroke-width="1.5"/>
      <text x="279" y="132" text-anchor="middle" font-size="9.5" fill="var(--color-q1,#9d8cff)">aggregation query</text>
      <text x="279" y="147" text-anchor="middle" font-size="8" fill="var(--color-muted,#8a8f9c)">UserCvDataGetByUserId</text>
      <text x="279" y="160" text-anchor="middle" font-size="8" fill="var(--color-muted,#8a8f9c)">5 result sets &#183; one round trip</text>
    </g>
    <path d="M350 140 H382" stroke="var(--color-q1,#9d8cff)" stroke-width="1.5" fill="none" marker-end="url(#csr-ah)"/>

    <!-- generator (the SSOT) -->
    <g class="csr-node" tabindex="0" role="group" aria-label="The single source of truth: one server-side QuestPDF generator behind ICvDocumentGenerator — a thin dispatcher over a shared render model, theme table, and font-safe components, dispatching to six template classes">
      <title>QuestPDF generator &#183; ICvDocumentGenerator &#8212; the single source of truth</title>
      <rect class="csr-hit" x="384" y="60" width="196" height="160"/>
      <rect class="csr-box" x="388" y="64" width="188" height="152" rx="9" fill="var(--color-q0,#5fc9bf)" fill-opacity="0.12" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.8"/>
      <text x="482" y="86" text-anchor="middle" font-size="10.5" fill="var(--color-q0,#5fc9bf)">QuestPDF generator</text>
      <text x="482" y="100" text-anchor="middle" font-size="8" fill="var(--color-muted,#8a8f9c)">ICvDocumentGenerator &#183; the SSOT</text>
      <line x1="404" y1="110" x2="560" y2="110" stroke="var(--color-muted,#8a8f9c)" stroke-width="0.8" opacity="0.4"/>
      <text x="482" y="128" text-anchor="middle" font-size="8.5">thin dispatcher</text>
      <text x="482" y="146" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">CvRenderModel &#183; derive once</text>
      <text x="482" y="162" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">CvTheme &#183; CvComponents</text>
      <text x="482" y="180" text-anchor="middle" font-size="9" fill="var(--color-q0,#5fc9bf)">6 ICvTemplate classes</text>
      <text class="csr-note" x="482" y="204" text-anchor="middle" font-size="8" fill="var(--color-muted,#8a8f9c)">Classic fallback &#183; off-thread render</text>
    </g>

    <!-- outputs to clients -->
    <path d="M482 216 V246" stroke="var(--color-q1,#9d8cff)" stroke-width="1.6" fill="none" marker-end="url(#csr-ah)"/>
    <text x="482" y="240" text-anchor="middle" font-size="8.5" fill="var(--color-q0,#5fc9bf)">byte-identical PDF</text>

    <g class="csr-node" tabindex="0" role="group" aria-label="The web app calls the same generator and receives the identical PDF">
      <title>Web app &#183; identical PDF from the same generator</title>
      <rect class="csr-hit" x="300" y="250" width="170" height="46"/>
      <rect class="csr-box" x="304" y="254" width="162" height="38" rx="7" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <text x="385" y="272" text-anchor="middle" font-size="10">Web app (MVC)</text>
      <text x="385" y="286" text-anchor="middle" font-size="8" fill="var(--color-muted,#8a8f9c)">streams the server PDF</text>
    </g>
    <g class="csr-node" tabindex="0" role="group" aria-label="The Flutter mobile app calls the same generator and receives the identical PDF">
      <title>Flutter app &#183; identical PDF from the same generator</title>
      <rect class="csr-hit" x="494" y="250" width="170" height="46"/>
      <rect class="csr-box" x="498" y="254" width="162" height="38" rx="7" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <text x="579" y="272" text-anchor="middle" font-size="10">Flutter app</text>
      <text x="579" y="286" text-anchor="middle" font-size="8" fill="var(--color-muted,#8a8f9c)">opens / shares the PDF</text>
    </g>
    <path d="M470 264 C486 264, 486 264, 494 264" stroke="var(--color-muted,#8a8f9c)" stroke-width="1" fill="none" opacity="0.4"/>

    <text x="340" y="330" text-anchor="middle" font-size="9.5" fill="var(--color-muted,#8a8f9c)">no &#8220;web CV&#8221; vs &#8220;app CV&#8221; &#8212; the projection lives in one place, server-side</text>

    <text class="csr-hint" x="668" y="24" text-anchor="end" font-size="9" fill="var(--color-muted,#8a8f9c)">hover a node &#9656;</text>
  </g>
</svg>
