<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="bcd-c-title bcd-c-desc">
  <title id="bcd-c-title">Modified RetinaNet vs purpose-built detectors on BCCD (mAP@IoU 0.5)</title>
  <desc id="bcd-c-desc">A bar chart of mean average precision at IoU 0.5 on the BCCD test set. The fine-tuned RetinaNet scores 0.876, highlighted in teal. YOLOv5x scores 0.923, YOLOv7 scores 0.896, and CST-YOLO scores 0.927, all shown in muted purple. RetinaNet lands close to the purpose-built detectors without beating them. A note records that the same RetinaNet also scores 0.5525 mAP at the stricter IoU 0.50 to 0.95 sweep, from pretrained weights on a 4 gigabyte laptop GPU.</desc>
  <style>
    @keyframes bcd-c-grow { from{transform:scaleY(0)} to{transform:scaleY(1)} }
    .bcd-c-bar{transform-box:fill-box;transform-origin:50% 100%;animation:bcd-c-grow 1.4s cubic-bezier(.2,.7,.3,1) both}
    .bcd-c-b2{animation-delay:.15s}.bcd-c-b3{animation-delay:.3s}.bcd-c-b4{animation-delay:.45s}
    @keyframes bcd-c-fade{ from{opacity:0} to{opacity:1} }
    .bcd-c-lbl{animation:bcd-c-fade 1s ease-out 1s both}
    /* interactive (zero-JS): hover or keyboard-focus a bar to isolate its score */
    .bcd-c-col{ cursor:pointer; transition:opacity .2s ease; }
    .bcd-c-col:focus{ outline:none; }
    .bcd-c-hit{ fill:transparent; }
    svg:hover .bcd-c-col:not(:hover),
    svg:focus-within .bcd-c-col:not(:focus-within){ opacity:.35; }
    .bcd-c-col:hover .bcd-c-bar,
    .bcd-c-col:focus-within .bcd-c-bar{ stroke:var(--color-ink,#e9e7e0); stroke-width:1.5; }
    .bcd-c-note{ opacity:0; transition:opacity .18s ease; }
    .bcd-c-col:hover .bcd-c-note,
    .bcd-c-col:focus-within .bcd-c-note{ opacity:1; }
    .bcd-c-hint{ opacity:.6; }
    svg:hover .bcd-c-hint,
    svg:focus-within .bcd-c-hint{ opacity:0; transition:opacity .2s ease; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} .bcd-c-bar{transform:none} .bcd-c-lbl{opacity:1} }
  </style>
  <g style="font-family: var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)">

    <text x="320" y="26" text-anchor="middle" font-size="11" letter-spacing="1.4" fill="var(--color-q1,#9d8cff)">CLOSE, NOT AHEAD &#8212; mAP @ IoU 0.5 ON BCCD</text>
    <text class="bcd-c-hint" x="600" y="26" text-anchor="end" font-size="9" fill="var(--color-muted,#8a8f9c)">hover a bar &#9656;</text>

    <!-- gridlines + y labels -->
    <g stroke="var(--color-muted,#8a8f9c)" stroke-width="1" opacity=".25">
      <line x1="86" y1="70" x2="600" y2="70"/>
      <line x1="86" y1="122.5" x2="600" y2="122.5"/>
      <line x1="86" y1="175" x2="600" y2="175"/>
      <line x1="86" y1="227.5" x2="600" y2="227.5"/>
      <line x1="86" y1="280" x2="600" y2="280"/>
    </g>
    <g font-size="9" fill="var(--color-muted,#8a8f9c)" text-anchor="end">
      <text x="78" y="74">1.0</text>
      <text x="78" y="126.5">0.75</text>
      <text x="78" y="179">0.5</text>
      <text x="78" y="231.5">0.25</text>
      <text x="78" y="284">0</text>
    </g>

    <!-- bars as focusable columns (bar + value label + x label + reveal) -->
    <!-- ours 0.876 -->
    <g class="bcd-c-col" tabindex="0" role="group" aria-label="RetinaNet, ours, fine-tuned: 0.876 mAP at IoU 0.5 — close to the purpose-built detectors without beating them">
      <title>RetinaNet (ours) &#8212; 0.876 mAP@0.5</title>
      <rect class="bcd-c-hit" x="105" y="60" width="90" height="252"/>
      <rect class="bcd-c-bar" x="113" y="96" width="74" height="184" rx="3" fill="var(--color-q0,#5fc9bf)" fill-opacity=".9"/>
      <text class="bcd-c-lbl" x="150" y="88" text-anchor="middle" font-size="12" fill="var(--color-q0,#5fc9bf)">0.876</text>
      <text x="150" y="298" text-anchor="middle" font-size="10" fill="var(--color-q0,#5fc9bf)">RetinaNet</text>
      <text x="150" y="311" text-anchor="middle" font-size="8" fill="var(--color-muted,#8a8f9c)">ours, fine-tuned</text>
      <text class="bcd-c-note" x="320" y="46" text-anchor="middle" font-size="10.5" fill="var(--color-q0,#5fc9bf)">RetinaNet (ours) &#8594; 0.876 mAP@0.5 &#8212; fine-tuned on a 4 GB laptop, pretrained weights</text>
    </g>
    <!-- yolov5x 0.923 -->
    <g class="bcd-c-col" tabindex="0" role="group" aria-label="YOLOv5x: 0.923 mAP at IoU 0.5, 0.047 above our RetinaNet">
      <title>YOLOv5x &#8212; 0.923 mAP@0.5 (+0.047 vs ours)</title>
      <rect class="bcd-c-hit" x="225" y="60" width="90" height="252"/>
      <rect class="bcd-c-bar bcd-c-b2" x="233" y="86" width="74" height="194" rx="3" fill="var(--color-q1,#9d8cff)" fill-opacity=".55"/>
      <text class="bcd-c-lbl" x="270" y="78" text-anchor="middle" font-size="12" fill="var(--color-ink,#e9e7e0)">0.923</text>
      <text x="270" y="298" text-anchor="middle" font-size="10" fill="var(--color-muted,#8a8f9c)">YOLOv5x</text>
      <text class="bcd-c-note" x="320" y="46" text-anchor="middle" font-size="10.5" fill="var(--color-q1,#9d8cff)">YOLOv5x &#8594; 0.923 mAP@0.5 &#8212; +0.047 over our RetinaNet</text>
    </g>
    <!-- yolov7 0.896 -->
    <g class="bcd-c-col" tabindex="0" role="group" aria-label="YOLOv7: 0.896 mAP at IoU 0.5, 0.020 above our RetinaNet">
      <title>YOLOv7 &#8212; 0.896 mAP@0.5 (+0.020 vs ours)</title>
      <rect class="bcd-c-hit" x="345" y="60" width="90" height="252"/>
      <rect class="bcd-c-bar bcd-c-b3" x="353" y="92" width="74" height="188" rx="3" fill="var(--color-q1,#9d8cff)" fill-opacity=".55"/>
      <text class="bcd-c-lbl" x="390" y="84" text-anchor="middle" font-size="12" fill="var(--color-ink,#e9e7e0)">0.896</text>
      <text x="390" y="298" text-anchor="middle" font-size="10" fill="var(--color-muted,#8a8f9c)">YOLOv7</text>
      <text class="bcd-c-note" x="320" y="46" text-anchor="middle" font-size="10.5" fill="var(--color-q1,#9d8cff)">YOLOv7 &#8594; 0.896 mAP@0.5 &#8212; +0.020 over our RetinaNet</text>
    </g>
    <!-- cst-yolo 0.927 -->
    <g class="bcd-c-col" tabindex="0" role="group" aria-label="CST-YOLO: 0.927 mAP at IoU 0.5, the best here, 0.051 above our RetinaNet">
      <title>CST-YOLO &#8212; 0.927 mAP@0.5 (+0.051 vs ours, best)</title>
      <rect class="bcd-c-hit" x="465" y="60" width="90" height="252"/>
      <rect class="bcd-c-bar bcd-c-b4" x="473" y="85" width="74" height="195" rx="3" fill="var(--color-q1,#9d8cff)" fill-opacity=".55"/>
      <text class="bcd-c-lbl" x="510" y="77" text-anchor="middle" font-size="12" fill="var(--color-ink,#e9e7e0)">0.927</text>
      <text x="510" y="298" text-anchor="middle" font-size="10" fill="var(--color-muted,#8a8f9c)">CST-YOLO</text>
      <text class="bcd-c-note" x="320" y="46" text-anchor="middle" font-size="10.5" fill="var(--color-q1,#9d8cff)">CST-YOLO &#8594; 0.927 mAP@0.5 &#8212; +0.051 over our RetinaNet (best here)</text>
    </g>

    <text x="320" y="330" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">Fig. &#8212; same RetinaNet scores 0.5525 mAP @ IoU 0.50:0.95 (val best &#8776; 0.58)</text>
    <text x="320" y="344" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">4 GB laptop, pretrained weights, no architecture surgery</text>
  </g>
</svg>
