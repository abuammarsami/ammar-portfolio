<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 360" width="830" height="360" role="img" aria-labelledby="kva-title">
  <title id="kva-title">The self-healing kiosk loop: a timer function screenshots each kiosk via the KLR API into metadata-tagged Blob storage, Azure AI Vision inspects the frame with OCR, and a fault fires a restart command back to the device plus a queue message that a separate mailer function turns into an operator alert — orchestrated by .NET Aspire, deployed to Container Apps by azd</title>
  <defs>
    <marker id="kva-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
    </marker>
    <marker id="kva-ah-heal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-q0, #5fc9bf)" />
    </marker>
  </defs>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- .NET Aspire orchestration boundary (the Azure Functions app) -->
    <rect x="150" y="58" width="600" height="250" rx="4" fill="none" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.55" />
    <text x="166" y="80" font-size="12" fill="var(--color-muted, #8a8f9c)">.NET Aspire — orchestration · OpenTelemetry · service discovery</text>

    <!-- kiosk fleet (edge devices, outside the Aspire app) -->
    <rect x="20" y="96" width="110" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="75" y="118" text-anchor="middle" font-size="12">kiosk fleet</text>
    <text x="75" y="136" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">200+ devices</text>

    <!-- top row: timer fn -> blob -> vision -->
    <rect x="172" y="96" width="160" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="252" y="118" text-anchor="middle" font-size="12">Timer function</text>
    <text x="252" y="136" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">KioskImageAnalysis</text>

    <rect x="372" y="96" width="140" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="442" y="118" text-anchor="middle" font-size="12">Azure Blob</text>
    <text x="442" y="136" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">frame + metadata</text>

    <rect x="552" y="96" width="160" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="632" y="118" text-anchor="middle" font-size="12">Azure AI Vision</text>
    <text x="632" y="136" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">OCR · pluggable</text>

    <!-- top-row arrows -->
    <g stroke="var(--color-muted, #8a8f9c)" stroke-width="2" fill="none" marker-end="url(#kva-ah)">
      <line x1="130" y1="122" x2="172" y2="122" />
      <line x1="332" y1="122" x2="372" y2="122" />
      <line x1="512" y1="122" x2="552" y2="122" />
    </g>
    <text x="151" y="90" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">① frame</text>
    <text x="352" y="90" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">② upload</text>
    <text x="532" y="90" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">③ OCR</text>

    <!-- bottom row: mailer fn <- baddataqueue <- (vision fault) ; email out -->
    <rect x="552" y="236" width="160" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-q1, #9d8cff)" stroke-width="2" />
    <text x="632" y="258" text-anchor="middle" font-size="12">baddataqueue</text>
    <text x="632" y="276" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">Azure Queue</text>

    <rect x="372" y="236" width="140" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="442" y="258" text-anchor="middle" font-size="12">Mailer function</text>
    <text x="442" y="276" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">queue-triggered</text>

    <rect x="172" y="236" width="160" height="52" rx="2" fill="none" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="252" y="258" text-anchor="middle" font-size="12">operator alert</text>
    <text x="252" y="276" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">email</text>

    <!-- vision fault -> queue (down) -->
    <line x1="632" y1="148" x2="632" y2="236" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" marker-end="url(#kva-ah)" />
    <text x="640" y="196" font-size="10.5" fill="var(--color-muted, #8a8f9c)">④ fault → enqueue</text>

    <!-- queue -> mailer -> email (left) -->
    <g stroke="var(--color-muted, #8a8f9c)" stroke-width="2" fill="none" marker-end="url(#kva-ah)">
      <line x1="552" y1="262" x2="512" y2="262" />
      <line x1="372" y1="262" x2="332" y2="262" />
    </g>
    <text x="532" y="228" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">⑤ trigger</text>
    <text x="352" y="228" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">⑥ alert</text>

    <!-- self-heal: vision fault -> restart command back to the kiosk (accent, over the top) -->
    <path d="M 632 96 C 632 34, 632 34, 380 34 C 130 34, 75 34, 75 96" fill="none" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#kva-ah-heal)" />
    <text x="380" y="27" text-anchor="middle" font-size="11" fill="var(--color-q0, #5fc9bf)">self-heal — restart / reboot command (KLR)</text>

    <!-- delivery note -->
    <text x="415" y="336" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">Friday-priority timer · orchestrated by .NET Aspire · deployed to Azure Container Apps by azd</text>
  </g>
</svg>
