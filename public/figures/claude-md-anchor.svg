<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520" role="img" aria-labelledby="c1-title c1-desc">
  <title id="c1-title">What a too-big CLAUDE.md costs you</title>
  <desc id="c1-desc">A single CLAUDE.md of 1,014 lines is re-read on every turn. It is divided into stacked blocks sized to their line counts — domain rules, stored procs, auth flows, audit findings, payment rules — all noise, styled in muted red, except one small highlighted teal block of about 40 lines that actually matters this turn. A load sweep passes over the whole file each loop.</desc>
  <defs>
    <marker id="c1-aht" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-q0, #5fc9bf)" />
    </marker>
    <marker id="c1-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
    </marker>
    <linearGradient id="c1-sweepg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--color-q0, #5fc9bf)" stop-opacity="0" />
      <stop offset="0.5" stop-color="var(--color-q0, #5fc9bf)" stop-opacity="0.30" />
      <stop offset="1" stop-color="var(--color-q0, #5fc9bf)" stop-opacity="0" />
    </linearGradient>
  </defs>
  <style>
    @keyframes c1-sweep {
      0%   { transform: translateY(-42px); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translateY(322px); opacity: 0; }
    }
    @keyframes c1-glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.85; } }
    .c1-sweep { animation: c1-sweep 4.6s ease-in-out infinite; }
    .c1-halo  { animation: c1-glow 3.2s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .c1-sweep { animation: none; opacity: 0; }
      .c1-halo  { animation: none; opacity: 0.5; }
    }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- header -->
    <text x="365" y="44" text-anchor="middle" font-size="13">CLAUDE.md · 1,014 lines</text>
    <rect x="295" y="54" width="140" height="22" rx="11" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" />
    <text x="365" y="69" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">loaded every turn</text>

    <!-- ── STACK (the document) ── -->
    <!-- noise blocks (red) -->
    <rect x="250" y="92" width="230" height="64" rx="3" fill="var(--color-surface, #12151d)" stroke="var(--color-error, #d32f2f)" stroke-width="1.5" opacity="0.9" />
    <text x="365" y="128" text-anchor="middle" font-size="11.5">Domain rules · ~150</text>

    <rect x="250" y="160" width="230" height="56" rx="3" fill="var(--color-surface, #12151d)" stroke="var(--color-error, #d32f2f)" stroke-width="1.5" opacity="0.9" />
    <text x="365" y="192" text-anchor="middle" font-size="11.5">Auth flows · ~120</text>

    <rect x="250" y="220" width="230" height="48" rx="3" fill="var(--color-surface, #12151d)" stroke="var(--color-error, #d32f2f)" stroke-width="1.5" opacity="0.9" />
    <text x="365" y="248" text-anchor="middle" font-size="11.5">Payment rules · ~90</text>

    <rect x="250" y="272" width="230" height="46" rx="3" fill="var(--color-surface, #12151d)" stroke="var(--color-error, #d32f2f)" stroke-width="1.5" opacity="0.9" />
    <text x="365" y="299" text-anchor="middle" font-size="11.5">Stored procs · ~80</text>

    <rect x="250" y="322" width="230" height="42" rx="3" fill="var(--color-surface, #12151d)" stroke="var(--color-error, #d32f2f)" stroke-width="1.5" opacity="0.9" />
    <text x="365" y="347" text-anchor="middle" font-size="11.5">Audit findings · ~70</text>

    <!-- the signal block (teal) -->
    <rect x="250" y="368" width="230" height="42" rx="3" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <rect class="c1-halo" x="250" y="368" width="230" height="42" rx="3" fill="none" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0.4" />
    <text x="365" y="393" text-anchor="middle" font-size="11.5" fill="var(--color-q0, #5fc9bf)">the ~40 lines that matter</text>

    <!-- load sweep over the whole file -->
    <rect class="c1-sweep" x="250" y="92" width="230" height="34" rx="3" fill="url(#c1-sweepg)" />

    <!-- ── left annotation ── -->
    <rect x="30" y="210" width="185" height="84" rx="3" fill="none" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" stroke-dasharray="6 5" opacity="0.6" />
    <text x="122" y="238" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">the whole file</text>
    <text x="122" y="258" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">is re-read on</text>
    <text x="122" y="278" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">every single turn</text>
    <line x1="215" y1="252" x2="247" y2="244" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" marker-end="url(#c1-ah)" />

    <!-- ── right callout ── -->
    <line x1="480" y1="389" x2="543" y2="385" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" marker-end="url(#c1-aht)" />
    <rect x="545" y="356" width="210" height="58" rx="3" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.95" />
    <text x="650" y="381" text-anchor="middle" font-size="10.5" fill="var(--color-q0, #5fc9bf)">only ~40 lines matter</text>
    <text x="650" y="401" text-anchor="middle" font-size="10" fill="var(--color-muted, #8a8f9c)">this turn — the rest is noise</text>

    <!-- legend line -->
    <text x="390" y="452" text-anchor="middle" font-size="11" fill="var(--color-error, #d32f2f)">every red block — loaded · paid for · competing for attention</text>

    <!-- caption -->
    <text x="390" y="484" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">Fig. — one CLAUDE.md, 1,014 lines, re-read every turn: only ~40 lines are relevant;</text>
    <text x="390" y="500" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">every other block is still loaded, paid for, and competing for the model's attention.</text>
  </g>
</svg>
