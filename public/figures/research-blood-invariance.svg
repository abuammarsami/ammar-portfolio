<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 372" role="img" aria-labelledby="bcd-a-title bcd-a-desc">
  <title id="bcd-a-title">An augmentation is a claim about invariance</title>
  <desc id="bcd-a-desc">Four transforms applied to a stained blood cell, each with a verdict. A horizontal flip keeps the label — teal, label OK. A rotation keeps the label — teal, label OK. A hue-shift breaks the label — red, label lost, because the stain colour is the diagnostic signal; this card flashes to mark a false invariance. A scale change is risky — muted, because cell size is itself diagnostic.</desc>
  <style>
    @keyframes bcd-a-r1 { 0%,4%{opacity:0} 12%,94%{opacity:1} 100%{opacity:0} }
    @keyframes bcd-a-r2 { 0%,26%{opacity:0} 34%,94%{opacity:1} 100%{opacity:0} }
    @keyframes bcd-a-r3 { 0%,48%{opacity:0} 56%,94%{opacity:1} 100%{opacity:0} }
    @keyframes bcd-a-r4 { 0%,70%{opacity:0} 78%,94%{opacity:1} 100%{opacity:0} }
    @keyframes bcd-a-flash { 0%,48%{opacity:0} 56%{opacity:.8} 63%{opacity:.15} 71%{opacity:.7} 80%{opacity:.2} 94%{opacity:.4} 100%{opacity:0} }
    .bcd-a-r1{animation:bcd-a-r1 12s ease-in-out infinite}
    .bcd-a-r2{animation:bcd-a-r2 12s ease-in-out infinite}
    .bcd-a-r3{animation:bcd-a-r3 12s ease-in-out infinite}
    .bcd-a-r4{animation:bcd-a-r4 12s ease-in-out infinite}
    .bcd-a-flash{animation:bcd-a-flash 12s ease-in-out infinite}
    /* interactive (zero-JS): hover or keyboard-focus a card to isolate its verdict */
    .bcd-a-col{ cursor:pointer; transition:opacity .2s ease; }
    .bcd-a-col:focus{ outline:none; }
    .bcd-a-hit{ fill:transparent; }
    svg:hover .bcd-a-col:not(:hover),
    svg:focus-within .bcd-a-col:not(:focus-within){ opacity:.35; }
    .bcd-a-hl{ opacity:0; transition:opacity .18s ease; }
    .bcd-a-col:hover .bcd-a-hl,
    .bcd-a-col:focus-within .bcd-a-hl{ opacity:1; }
    .bcd-a-note{ opacity:0; transition:opacity .18s ease; }
    .bcd-a-col:hover .bcd-a-note,
    .bcd-a-col:focus-within .bcd-a-note{ opacity:1; }
    .bcd-a-hint{ opacity:.6; }
    svg:hover .bcd-a-hint,
    svg:focus-within .bcd-a-hint{ opacity:0; transition:opacity .2s ease; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} .bcd-a-r1,.bcd-a-r2,.bcd-a-r3,.bcd-a-r4{opacity:1} .bcd-a-flash{opacity:0} }
  </style>
  <g style="font-family: var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)">

    <text x="320" y="26" text-anchor="middle" font-size="11" letter-spacing="1.4" fill="var(--color-q1,#9d8cff)">AN AUGMENTATION IS A CLAIM ABOUT INVARIANCE</text>
    <text x="320" y="46" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">one question per transform: does the true label survive it?</text>
    <text class="bcd-a-hint" x="614" y="26" text-anchor="end" font-size="9" fill="var(--color-muted,#8a8f9c)">hover a card &#9656;</text>

    <!-- CARD 1 flip -->
    <g class="bcd-a-col" tabindex="0" role="group" aria-label="Flip transform, verdict label preserved: a smear has no left or right, so a mirror image is the same claim">
      <title>flip &#8212; label preserved (no left/right in a smear)</title>
      <rect class="bcd-a-hit" x="26" y="66" width="138" height="196" rx="6"/>
      <rect x="26" y="66" width="138" height="196" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3" opacity=".5"/>
      <text x="95" y="92" text-anchor="middle" font-size="13">flip</text>
      <text x="95" y="108" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">no L / R in a smear</text>
      <g transform="translate(95,162) scale(-1,1)" opacity=".35">
        <circle r="26" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.6"/>
        <circle cx="9" cy="-6" r="10" fill="var(--color-muted,#8a8f9c)" fill-opacity=".4"/>
      </g>
      <g class="bcd-a-r1">
        <rect x="26" y="66" width="138" height="196" rx="6" fill="var(--color-q0,#5fc9bf)" fill-opacity=".05" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.8"/>
        <g transform="translate(95,162) scale(-1,1)">
          <circle r="26" fill="none" stroke="var(--color-q0,#5fc9bf)" stroke-width="2"/>
          <circle cx="9" cy="-6" r="10" fill="var(--color-q0,#5fc9bf)" fill-opacity=".5"/>
        </g>
        <rect x="43" y="216" width="104" height="26" rx="13" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.3"/>
        <text x="95" y="233" text-anchor="middle" font-size="10.5" fill="var(--color-q0,#5fc9bf)">label OK &#10003;</text>
      </g>
      <rect class="bcd-a-hl" x="26" y="66" width="138" height="196" rx="6" fill="none" stroke="var(--color-q0,#5fc9bf)" stroke-width="2.2"/>
      <text class="bcd-a-note" x="320" y="350" text-anchor="middle" font-size="10.5" fill="var(--color-q0,#5fc9bf)">flip &#8594; mirror image, true label preserved (no left/right in a smear)</text>
    </g>

    <!-- CARD 2 rotate -->
    <g class="bcd-a-col" tabindex="0" role="group" aria-label="Rotate transform, verdict label preserved: a smear has no canonical up, so orientation carries no label">
      <title>rotate &#8212; label preserved (no up in a smear)</title>
      <rect class="bcd-a-hit" x="180" y="66" width="138" height="196" rx="6"/>
      <rect x="180" y="66" width="138" height="196" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3" opacity=".5"/>
      <text x="249" y="92" text-anchor="middle" font-size="13">rotate</text>
      <text x="249" y="108" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">no up in a smear</text>
      <g transform="translate(249,162) rotate(40)" opacity=".35">
        <circle r="26" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.6"/>
        <circle cx="9" cy="-6" r="10" fill="var(--color-muted,#8a8f9c)" fill-opacity=".4"/>
      </g>
      <g class="bcd-a-r2">
        <rect x="180" y="66" width="138" height="196" rx="6" fill="var(--color-q0,#5fc9bf)" fill-opacity=".05" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.8"/>
        <g transform="translate(249,162) rotate(40)">
          <circle r="26" fill="none" stroke="var(--color-q0,#5fc9bf)" stroke-width="2"/>
          <circle cx="9" cy="-6" r="10" fill="var(--color-q0,#5fc9bf)" fill-opacity=".5"/>
        </g>
        <rect x="197" y="216" width="104" height="26" rx="13" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.3"/>
        <text x="249" y="233" text-anchor="middle" font-size="10.5" fill="var(--color-q0,#5fc9bf)">label OK &#10003;</text>
      </g>
      <rect class="bcd-a-hl" x="180" y="66" width="138" height="196" rx="6" fill="none" stroke="var(--color-q0,#5fc9bf)" stroke-width="2.2"/>
      <text class="bcd-a-note" x="320" y="350" text-anchor="middle" font-size="10.5" fill="var(--color-q0,#5fc9bf)">rotate &#8594; any angle, true label preserved (no canonical up in a smear)</text>
    </g>

    <!-- CARD 3 hue -->
    <g class="bcd-a-col" tabindex="0" role="group" aria-label="Hue-shift transform, verdict label lost: the stain colour is the diagnostic cue that separates cell types, so recolouring destroys the label">
      <title>hue-shift &#8212; label lost (stain colour IS the signal)</title>
      <rect class="bcd-a-hit" x="334" y="66" width="138" height="196" rx="6"/>
      <rect x="334" y="66" width="138" height="196" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3" opacity=".5"/>
      <text x="403" y="92" text-anchor="middle" font-size="13">hue-shift</text>
      <text x="403" y="108" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">stain colour IS signal</text>
      <g transform="translate(403,162)" opacity=".35">
        <circle r="26" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.6"/>
        <circle cx="9" cy="-6" r="10" fill="var(--color-muted,#8a8f9c)" fill-opacity=".4"/>
      </g>
      <rect class="bcd-a-flash" x="334" y="66" width="138" height="196" rx="6" fill="var(--color-error,#ef4444)" fill-opacity=".07" stroke="var(--color-error,#ef4444)" stroke-width="1.8"/>
      <g class="bcd-a-r3">
        <g transform="translate(403,162)">
          <circle r="26" fill="none" stroke="var(--color-error,#ef4444)" stroke-width="2"/>
          <circle cx="9" cy="-6" r="10" fill="var(--color-error,#ef4444)" fill-opacity=".5"/>
        </g>
        <rect x="345" y="216" width="116" height="26" rx="13" fill="var(--color-surface,#12151d)" stroke="var(--color-error,#ef4444)" stroke-width="1.3"/>
        <text x="403" y="233" text-anchor="middle" font-size="10.5" fill="var(--color-error,#ef4444)">label lost &#10007;</text>
      </g>
      <rect class="bcd-a-hl" x="334" y="66" width="138" height="196" rx="6" fill="none" stroke="var(--color-error,#ef4444)" stroke-width="2.2"/>
      <text class="bcd-a-note" x="320" y="350" text-anchor="middle" font-size="10.5" fill="var(--color-error,#ef4444)">hue-shift &#8594; recolours the stain that IDs the cell &#8212; the label is destroyed</text>
    </g>

    <!-- CARD 4 scale -->
    <g class="bcd-a-col" tabindex="0" role="group" aria-label="Scale transform, verdict risky: cell size is itself diagnostic, so aggressive scaling can rewrite the label">
      <title>scale &#8212; risky (cell size is diagnostic)</title>
      <rect class="bcd-a-hit" x="488" y="66" width="138" height="196" rx="6"/>
      <rect x="488" y="66" width="138" height="196" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3" opacity=".5"/>
      <text x="557" y="92" text-anchor="middle" font-size="13">scale</text>
      <text x="557" y="108" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">size is diagnostic</text>
      <circle cx="557" cy="162" r="20" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.1" stroke-dasharray="3 4" opacity=".5"/>
      <g transform="translate(557,162)" opacity=".4">
        <circle r="32" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.6"/>
        <circle cx="11" cy="-7" r="12" fill="var(--color-muted,#8a8f9c)" fill-opacity=".4"/>
      </g>
      <g class="bcd-a-r4">
        <rect x="488" y="66" width="138" height="196" rx="6" fill="var(--color-muted,#8a8f9c)" fill-opacity=".04" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.8"/>
        <rect x="505" y="216" width="104" height="26" rx="13" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3"/>
        <text x="557" y="233" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">risky &#126;</text>
      </g>
      <rect class="bcd-a-hl" x="488" y="66" width="138" height="196" rx="6" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="2.2"/>
      <text class="bcd-a-note" x="320" y="350" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">scale &#8594; cell size is itself diagnostic &#8212; aggressive scaling can mislead</text>
    </g>

    <text x="320" y="300" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">Fig. &#8212; flip and rotate are true invariances for a smear; hue-shift is a lie (stain colour is the</text>
    <text x="320" y="318" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">label), aggressive scale is risky (size is diagnostic). I trained on only the true ones.</text>
  </g>
</svg>
