<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 412" width="880" height="412" role="img" aria-labelledby="r4-title r4-desc">
  <title id="r4-title">An augmentation is a claim about invariance</title>
  <desc id="r4-desc">A stained blood cell is put through four transforms, each labelled by whether the true label survives it. A horizontal flip survives — teal, label OK. A rotation survives — teal, label OK. A hue-shift breaks the label — red, label lost, because in microscopy the stain colour IS the diagnostic signal. A scale change is risky — muted, because cell size is itself diagnostic. Each verdict appears in turn; the hue-shift card flashes red to mark the false invariance you must never train the model to believe.</desc>
  <style>
    @keyframes r4-v1 { 0%,4%{opacity:0} 11%,95%{opacity:1} 100%{opacity:0} }
    @keyframes r4-v2 { 0%,24%{opacity:0} 31%,95%{opacity:1} 100%{opacity:0} }
    @keyframes r4-v3 { 0%,44%{opacity:0} 51%,95%{opacity:1} 100%{opacity:0} }
    @keyframes r4-v4 { 0%,64%{opacity:0} 71%,95%{opacity:1} 100%{opacity:0} }
    @keyframes r4-flash {
      0%,44%{opacity:0} 51%{opacity:0.85} 58%{opacity:0.15} 66%{opacity:0.8}
      74%{opacity:0.2} 82%{opacity:0.7} 95%{opacity:0.45} 100%{opacity:0}
    }
    .r4-v1 { animation: r4-v1 11s ease-in-out infinite; }
    .r4-v2 { animation: r4-v2 11s ease-in-out infinite; }
    .r4-v3 { animation: r4-v3 11s ease-in-out infinite; }
    .r4-v4 { animation: r4-v4 11s ease-in-out infinite; }
    .r4-flash { animation: r4-flash 11s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .r4-v1, .r4-v2, .r4-v3, .r4-v4 { animation: none; opacity: 1; }
      .r4-flash { animation: none; opacity: 0; }
    }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- eyebrow -->
    <text x="440" y="28" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="var(--color-q1, #9d8cff)">AN AUGMENTATION IS A CLAIM ABOUT INVARIANCE</text>
    <text x="440" y="52" text-anchor="middle" font-size="11.5" fill="var(--color-muted, #8a8f9c)">for each transform, one question: does the true label survive it?</text>

    <!-- ══ CARD 1 · flip → survives ══ (x 38) -->
    <rect x="38" y="80" width="190" height="214" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.55" />
    <text x="133" y="110" text-anchor="middle" font-size="14">flip</text>
    <text x="133" y="128" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">no canonical L / R</text>
    <!-- dim base cell -->
    <g transform="translate(133,182) scale(-1,1)" fill="none" opacity="0.4">
      <circle cx="0" cy="0" r="24" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.8" />
      <circle cx="8" cy="-5" r="9" fill="var(--color-muted, #8a8f9c)" fill-opacity="0.4" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.2" />
    </g>
    <g class="r4-v1" opacity="0">
      <rect x="38" y="80" width="190" height="214" rx="6" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.06" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
      <g transform="translate(133,182) scale(-1,1)" fill="none">
        <circle cx="0" cy="0" r="24" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
        <circle cx="8" cy="-5" r="9" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.45" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.3" />
      </g>
      <rect x="66" y="240" width="134" height="28" rx="14" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.4" />
      <text x="133" y="259" text-anchor="middle" font-size="11.5" fill="var(--color-q0, #5fc9bf)">survives &#10003;</text>
    </g>

    <!-- ══ CARD 2 · rotate → survives ══ (x 243) -->
    <rect x="243" y="80" width="190" height="214" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.55" />
    <text x="338" y="110" text-anchor="middle" font-size="14">rotate</text>
    <text x="338" y="128" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">no up in a smear</text>
    <g transform="translate(338,182) rotate(38)" fill="none" opacity="0.4">
      <circle cx="0" cy="0" r="24" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.8" />
      <circle cx="8" cy="-5" r="9" fill="var(--color-muted, #8a8f9c)" fill-opacity="0.4" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.2" />
    </g>
    <g class="r4-v2" opacity="0">
      <rect x="243" y="80" width="190" height="214" rx="6" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.06" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
      <g transform="translate(338,182) rotate(38)" fill="none">
        <circle cx="0" cy="0" r="24" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
        <circle cx="8" cy="-5" r="9" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.45" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.3" />
      </g>
      <rect x="271" y="240" width="134" height="28" rx="14" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.4" />
      <text x="338" y="259" text-anchor="middle" font-size="11.5" fill="var(--color-q0, #5fc9bf)">survives &#10003;</text>
    </g>

    <!-- ══ CARD 3 · hue-shift → label lost ══ (x 448) -->
    <rect x="448" y="80" width="190" height="214" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.55" />
    <text x="543" y="110" text-anchor="middle" font-size="14">hue-shift</text>
    <text x="543" y="128" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">stain colour IS signal</text>
    <g transform="translate(543,182)" fill="none" opacity="0.4">
      <circle cx="0" cy="0" r="24" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.8" />
      <circle cx="8" cy="-5" r="9" fill="var(--color-muted, #8a8f9c)" fill-opacity="0.4" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.2" />
    </g>
    <!-- red flashing danger ring -->
    <rect class="r4-flash" x="448" y="80" width="190" height="214" rx="6" fill="var(--color-error, #ef4444)" fill-opacity="0.07" stroke="var(--color-error, #ef4444)" stroke-width="2" opacity="0" />
    <g class="r4-v3" opacity="0">
      <g transform="translate(543,182)" fill="none">
        <circle cx="0" cy="0" r="24" stroke="var(--color-error, #ef4444)" stroke-width="2" />
        <circle cx="8" cy="-5" r="9" fill="var(--color-error, #ef4444)" fill-opacity="0.5" stroke="var(--color-error, #ef4444)" stroke-width="1.3" />
      </g>
      <rect x="471" y="240" width="144" height="28" rx="14" fill="var(--color-surface, #12151d)" stroke="var(--color-error, #ef4444)" stroke-width="1.4" />
      <text x="543" y="259" text-anchor="middle" font-size="11.5" fill="var(--color-error, #ef4444)">label lost &#10007;</text>
    </g>

    <!-- ══ CARD 4 · scale → risky ══ (x 653) -->
    <rect x="653" y="80" width="190" height="214" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.55" />
    <text x="748" y="110" text-anchor="middle" font-size="14">scale</text>
    <text x="748" y="128" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">cell size is diagnostic</text>
    <!-- original outline (dashed) + grown cell -->
    <circle cx="748" cy="182" r="20" fill="none" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.2" stroke-dasharray="3 4" opacity="0.5" />
    <g transform="translate(748,182)" fill="none" opacity="0.45">
      <circle cx="0" cy="0" r="31" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.8" />
      <circle cx="10" cy="-6" r="11" fill="var(--color-muted, #8a8f9c)" fill-opacity="0.4" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.2" />
    </g>
    <g class="r4-v4" opacity="0">
      <rect x="653" y="80" width="190" height="214" rx="6" fill="var(--color-muted, #8a8f9c)" fill-opacity="0.05" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
      <rect x="681" y="240" width="134" height="28" rx="14" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
      <text x="748" y="259" text-anchor="middle" font-size="11.5" fill="var(--color-muted, #8a8f9c)">risky &#126;</text>
    </g>

    <!-- caption -->
    <text x="440" y="336" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">Fig. — every augmentation asserts an invariance. Flip and rotate are true for a smear; hue-shift is a lie</text>
    <text x="440" y="352" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">(stain colour is the label), and aggressive scale is risky (size is diagnostic). Turn on only the true ones.</text>
  </g>
</svg>
