<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360" role="img" aria-labelledby="mds-title">
  <title id="mds-title">The mosque-search scoring pipeline: a query is normalized, scored per weighted field as the max of three FuzzySharp algorithms, aggregated by the DisMax rule (strongest field plus 0.1 times the weighted rest, capped at 100), filtered at score 60 or above, ordered exact-match first, then cut to the top 10 — all with no machine-learning model</title>
  <defs>
    <marker id="mds-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
    </marker>
  </defs>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- top row -->
    <rect x="24" y="84" width="120" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="84" y="107" text-anchor="middle" font-size="12">query</text>
    <text x="84" y="125" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">"ICCR"</text>

    <rect x="184" y="84" width="130" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="249" y="107" text-anchor="middle" font-size="12">normalize</text>
    <text x="249" y="125" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">fold -_/ · lower</text>

    <rect x="354" y="84" width="170" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="439" y="107" text-anchor="middle" font-size="12">per-field score</text>
    <text x="439" y="125" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">max(Partial, TokenSet, Ratio)</text>

    <rect x="564" y="84" width="150" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-q1, #9d8cff)" stroke-width="2" />
    <text x="639" y="107" text-anchor="middle" font-size="12">DisMax</text>
    <text x="639" y="125" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">max + 0.1×rest ≤100</text>

    <!-- top-row arrows -->
    <g stroke="var(--color-muted, #8a8f9c)" stroke-width="2" fill="none" marker-end="url(#mds-ah)">
      <line x1="144" y1="110" x2="184" y2="110" />
      <line x1="314" y1="110" x2="354" y2="110" />
      <line x1="524" y1="110" x2="564" y2="110" />
    </g>

    <!-- field weights annotation under per-field score -->
    <text x="439" y="160" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">weights · slug 5.5 · name 5.4 · nick 5.2 · loc 3.5</text>

    <!-- DisMax down to bottom row -->
    <line x1="639" y1="136" x2="639" y2="244" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" marker-end="url(#mds-ah)" />

    <!-- bottom row (right to left) -->
    <rect x="564" y="244" width="150" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="639" y="267" text-anchor="middle" font-size="12">threshold</text>
    <text x="639" y="285" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">score ≥ 60</text>

    <rect x="354" y="244" width="170" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="439" y="267" text-anchor="middle" font-size="12">order</text>
    <text x="439" y="285" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">exact-first, then score</text>

    <rect x="184" y="244" width="130" height="52" rx="2" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="2" />
    <text x="249" y="267" text-anchor="middle" font-size="12">top 10</text>
    <text x="249" y="285" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">results</text>

    <g stroke="var(--color-muted, #8a8f9c)" stroke-width="2" fill="none" marker-end="url(#mds-ah)">
      <line x1="564" y1="270" x2="524" y2="270" />
      <line x1="354" y1="270" x2="314" y2="270" />
    </g>

    <!-- footer -->
    <text x="440" y="336" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">semantic-quality relevance — deterministic, explainable, no model or embeddings</text>
  </g>
</svg>
