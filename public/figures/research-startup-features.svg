<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="sup-f-title sup-f-desc">
  <title id="sup-f-title">What carried signal — top features by mutual information</title>
  <desc id="sup-f-desc">A horizontal bar chart of mutual information between each feature and the success label, computed on the oversampled training set. The strongest signals are maturity and money-in, not raw counts: age of last milestone (0.200), age of last funding (0.183), age of first milestone (0.152), normalized total funding (0.146), overall age (0.141), age of first funding (0.131), normalized relationships (0.107) and average investors per round (0.064). Most one-hot sector and geography flags score near zero. Surviving long enough to hit milestones and raise money is what separates the acquired from the closed.</desc>
  <style>
    @keyframes sup-f-grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .sup-f-bar { transform-box: fill-box; transform-origin: left; animation: sup-f-grow 1s cubic-bezier(.2,.7,.3,1) both; }
    .sup-f-1{animation-delay:.05s}.sup-f-2{animation-delay:.14s}.sup-f-3{animation-delay:.23s}.sup-f-4{animation-delay:.32s}
    .sup-f-5{animation-delay:.41s}.sup-f-6{animation-delay:.50s}.sup-f-7{animation-delay:.59s}.sup-f-8{animation-delay:.68s}
    /* interactive (zero-JS): hover or keyboard-focus a row to isolate it */
    .sup-f-col{ cursor:pointer; transition:opacity .2s ease; }
    .sup-f-col:focus{ outline:none; }
    .sup-f-hit{ fill:transparent; }
    svg:hover .sup-f-col:not(:hover),
    svg:focus-within .sup-f-col:not(:focus-within){ opacity:.35; }
    .sup-f-col:hover .sup-f-rect,
    .sup-f-col:focus-within .sup-f-rect{ stroke:var(--color-ink, #e9e7e0); stroke-width:1.5; }
    .sup-f-note{ opacity:0; transition:opacity .18s ease; }
    .sup-f-col:hover .sup-f-note,
    .sup-f-col:focus-within .sup-f-note{ opacity:1; }
    .sup-f-hint{ opacity:.6; }
    svg:hover .sup-f-hint,
    svg:focus-within .sup-f-hint{ opacity:0; transition:opacity .2s ease; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} .sup-f-bar{transform:none} }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="11">

    <text x="320" y="24" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="var(--color-q1, #9d8cff)">MUTUAL INFORMATION WITH SUCCESS &#183; TOP 8 OF 32</text>

    <!-- axis baseline -->
    <line x1="210" y1="46" x2="210" y2="332" stroke="var(--color-muted, #8a8f9c)" stroke-width="1" opacity="0.5" />

    <!-- bars: x0=210, width = MI*1950; pitch 34 from y=58 ; each wrapped in a focusable row -->
    <!-- 1 age_last_milestone 0.200 -->
    <g class="sup-f-col" tabindex="0" role="group" aria-label="age_last_milestone, mutual information 0.200 — the strongest signal, rank 1 of 32">
      <title>age_last_milestone &#183; MI 0.200 (rank 1 / 32)</title>
      <rect class="sup-f-hit" x="6" y="51" width="628" height="36"/>
      <text x="200" y="72" text-anchor="end" font-size="9.5" fill="var(--color-ink, #e9e7e0)">age_last_milestone</text>
      <rect class="sup-f-bar sup-f-1 sup-f-rect" x="210" y="58" width="390" height="20" rx="3" fill="var(--color-q0, #5fc9bf)" />
      <text x="606" y="72" font-size="9" fill="var(--color-q0, #5fc9bf)">0.200</text>
      <text class="sup-f-note" x="200" y="85" text-anchor="end" font-size="9" fill="var(--color-q0, #5fc9bf)">0.200 &#183; rank 1/32</text>
    </g>
    <!-- 2 age_last_funding 0.183 -->
    <g class="sup-f-col" tabindex="0" role="group" aria-label="age_last_funding, mutual information 0.183, rank 2 of 32">
      <title>age_last_funding &#183; MI 0.183 (rank 2 / 32)</title>
      <rect class="sup-f-hit" x="6" y="85" width="628" height="36"/>
      <text x="200" y="106" text-anchor="end" font-size="9.5" fill="var(--color-ink, #e9e7e0)">age_last_funding</text>
      <rect class="sup-f-bar sup-f-2 sup-f-rect" x="210" y="92" width="356.9" height="20" rx="3" fill="var(--color-q0, #5fc9bf)" />
      <text x="573" y="106" font-size="9" fill="var(--color-q0, #5fc9bf)">0.183</text>
      <text class="sup-f-note" x="200" y="119" text-anchor="end" font-size="9" fill="var(--color-q0, #5fc9bf)">0.183 &#183; rank 2/32</text>
    </g>
    <!-- 3 age_first_milestone 0.152 -->
    <g class="sup-f-col" tabindex="0" role="group" aria-label="age_first_milestone, mutual information 0.152, rank 3 of 32">
      <title>age_first_milestone &#183; MI 0.152 (rank 3 / 32)</title>
      <rect class="sup-f-hit" x="6" y="119" width="628" height="36"/>
      <text x="200" y="140" text-anchor="end" font-size="9.5" fill="var(--color-ink, #e9e7e0)">age_first_milestone</text>
      <rect class="sup-f-bar sup-f-3 sup-f-rect" x="210" y="126" width="296.4" height="20" rx="3" fill="var(--color-q0, #5fc9bf)" />
      <text x="512" y="140" font-size="9" fill="var(--color-q0, #5fc9bf)">0.152</text>
      <text class="sup-f-note" x="200" y="153" text-anchor="end" font-size="9" fill="var(--color-q0, #5fc9bf)">0.152 &#183; rank 3/32</text>
    </g>
    <!-- 4 funding_total* 0.146 -->
    <g class="sup-f-col" tabindex="0" role="group" aria-label="funding_total normalized, mutual information 0.146, rank 4 of 32">
      <title>funding_total &#42; &#183; MI 0.146 (rank 4 / 32)</title>
      <rect class="sup-f-hit" x="6" y="153" width="628" height="36"/>
      <text x="200" y="174" text-anchor="end" font-size="9.5" fill="var(--color-ink, #e9e7e0)">funding_total &#42;</text>
      <rect class="sup-f-bar sup-f-4 sup-f-rect" x="210" y="160" width="284.7" height="20" rx="3" fill="var(--color-q0, #5fc9bf)" />
      <text x="500" y="174" font-size="9" fill="var(--color-q0, #5fc9bf)">0.146</text>
      <text class="sup-f-note" x="200" y="187" text-anchor="end" font-size="9" fill="var(--color-q0, #5fc9bf)">0.146 &#183; rank 4/32</text>
    </g>
    <!-- 5 age 0.141 -->
    <g class="sup-f-col" tabindex="0" role="group" aria-label="age, mutual information 0.141, rank 5 of 32">
      <title>age &#183; MI 0.141 (rank 5 / 32)</title>
      <rect class="sup-f-hit" x="6" y="187" width="628" height="36"/>
      <text x="200" y="208" text-anchor="end" font-size="9.5" fill="var(--color-ink, #e9e7e0)">age</text>
      <rect class="sup-f-bar sup-f-5 sup-f-rect" x="210" y="194" width="275" height="20" rx="3" fill="var(--color-q1, #9d8cff)" opacity="0.75" />
      <text x="490" y="208" font-size="9" fill="var(--color-muted, #8a8f9c)">0.141</text>
      <text class="sup-f-note" x="200" y="221" text-anchor="end" font-size="9" fill="var(--color-muted, #8a8f9c)">0.141 &#183; rank 5/32</text>
    </g>
    <!-- 6 age_first_funding* 0.131 -->
    <g class="sup-f-col" tabindex="0" role="group" aria-label="age_first_funding normalized, mutual information 0.131, rank 6 of 32">
      <title>age_first_funding &#42; &#183; MI 0.131 (rank 6 / 32)</title>
      <rect class="sup-f-hit" x="6" y="221" width="628" height="36"/>
      <text x="200" y="242" text-anchor="end" font-size="9.5" fill="var(--color-ink, #e9e7e0)">age_first_funding &#42;</text>
      <rect class="sup-f-bar sup-f-6 sup-f-rect" x="210" y="228" width="255.5" height="20" rx="3" fill="var(--color-q1, #9d8cff)" opacity="0.75" />
      <text x="471" y="242" font-size="9" fill="var(--color-muted, #8a8f9c)">0.131</text>
      <text class="sup-f-note" x="200" y="255" text-anchor="end" font-size="9" fill="var(--color-muted, #8a8f9c)">0.131 &#183; rank 6/32</text>
    </g>
    <!-- 7 relationships* 0.107 -->
    <g class="sup-f-col" tabindex="0" role="group" aria-label="relationships normalized, mutual information 0.107, rank 7 of 32">
      <title>relationships &#42; &#183; MI 0.107 (rank 7 / 32)</title>
      <rect class="sup-f-hit" x="6" y="255" width="628" height="36"/>
      <text x="200" y="276" text-anchor="end" font-size="9.5" fill="var(--color-ink, #e9e7e0)">relationships &#42;</text>
      <rect class="sup-f-bar sup-f-7 sup-f-rect" x="210" y="262" width="208.7" height="20" rx="3" fill="var(--color-muted, #8a8f9c)" opacity="0.7" />
      <text x="424" y="276" font-size="9" fill="var(--color-muted, #8a8f9c)">0.107</text>
      <text class="sup-f-note" x="200" y="289" text-anchor="end" font-size="9" fill="var(--color-muted, #8a8f9c)">0.107 &#183; rank 7/32</text>
    </g>
    <!-- 8 avg_participants 0.064 -->
    <g class="sup-f-col" tabindex="0" role="group" aria-label="avg_participants, mutual information 0.064, rank 8 of 32">
      <title>avg_participants &#183; MI 0.064 (rank 8 / 32)</title>
      <rect class="sup-f-hit" x="6" y="289" width="628" height="36"/>
      <text x="200" y="310" text-anchor="end" font-size="9.5" fill="var(--color-ink, #e9e7e0)">avg_participants</text>
      <rect class="sup-f-bar sup-f-8 sup-f-rect" x="210" y="296" width="124.8" height="20" rx="3" fill="var(--color-muted, #8a8f9c)" opacity="0.7" />
      <text x="340" y="310" font-size="9" fill="var(--color-muted, #8a8f9c)">0.064</text>
      <text class="sup-f-note" x="200" y="323" text-anchor="end" font-size="9" fill="var(--color-muted, #8a8f9c)">0.064 &#183; rank 8/32</text>
    </g>

    <!-- interaction hint (fades out once the reader hovers the chart) -->
    <text class="sup-f-hint" x="628" y="24" text-anchor="end" font-size="9" fill="var(--color-muted, #8a8f9c)">hover a bar &#9656;</text>

    <text x="320" y="344" text-anchor="middle" font-size="10" fill="var(--color-muted, #8a8f9c)">Fig. &#8212; &#42; = MinMax-normalized. Maturity and money-in dominate; sector / geography one-hots score &#8776; 0.</text>
  </g>
</svg>
