<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="qenc-t qenc-d">
  <title id="qenc-t">Angle encoding into a variational quantum circuit</title>
  <desc id="qenc-d">Four qubit wires start in the |0> state. Each takes an RY rotation whose angle is pi times a classical pixel value — that is the angle encoding. The wires then pass through a variational ansatz block of entangling gates and parameterized rotations, and finally each wire is measured as a Pauli-Z expectation, producing four output channels.</desc>
  <defs>
    <marker id="qenc-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted,#8a8f9c)"/>
    </marker>
  </defs>
  <style>
    @keyframes qenc-flow { 0%{stroke-dashoffset:120;opacity:.25} 12%{opacity:1} 100%{stroke-dashoffset:0;opacity:1} }
    @keyframes qenc-enc  { 0%,100%{opacity:.45} 45%{opacity:1} }
    @keyframes qenc-ent  { 0%,100%{opacity:.35} 50%{opacity:.9} }
    @keyframes qenc-meter{ 0%,100%{transform:rotate(-24deg)} 50%{transform:rotate(24deg)} }
    .qenc-wire  { stroke-dasharray:120; animation:qenc-flow 4.2s ease-out infinite; }
    .qenc-w1{animation-delay:0s}.qenc-w2{animation-delay:.25s}.qenc-w3{animation-delay:.5s}.qenc-w4{animation-delay:.75s}
    .qenc-encbox{ animation:qenc-enc 3.4s ease-in-out infinite; }
    .qenc-ent   { animation:qenc-ent 2.8s ease-in-out infinite; }
    .qenc-needle{ transform-box:fill-box; transform-origin:center; animation:qenc-meter 3.2s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} .qenc-wire{stroke-dashoffset:0!important;opacity:1!important} }
  </style>
  <g style="font-family:var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)" font-size="12">
    <text x="320" y="26" text-anchor="middle" font-size="11" letter-spacing="1.4" fill="var(--color-q1,#9d8cff)">ANGLE ENCODING &#8594; VARIATIONAL ANSATZ &#8594; MEASUREMENT</text>
    <text x="150" y="52" text-anchor="middle" font-size="10" fill="var(--color-muted,#8a8f9c)">a pixel becomes a rotation angle</text>
    <text x="330" y="52" text-anchor="middle" font-size="10" fill="var(--color-muted,#8a8f9c)">trainable gates mix &amp; entangle</text>
    <text x="560" y="52" text-anchor="middle" font-size="10" fill="var(--color-muted,#8a8f9c)">read out &#10216;Z&#10217;</text>

    <!-- ansatz block backdrop -->
    <rect class="qenc-ent" x="252" y="72" width="168" height="248" rx="8" fill="var(--color-q1,#9d8cff)" opacity="0.35"/>
    <rect x="252" y="72" width="168" height="248" rx="8" fill="none" stroke="var(--color-q1,#9d8cff)" stroke-width="1.5" opacity="0.6"/>
    <text x="336" y="92" text-anchor="middle" font-size="10.5" fill="var(--color-q1,#9d8cff)">variational ansatz  &#952;</text>

    <!-- 4 qubit wires -->
    <g>
      <!-- wire ys: 128,182,236,290 -->
      <g>
        <text x="40" y="132" text-anchor="middle" font-size="12">|0&#10217;</text>
        <text x="40" y="186" text-anchor="middle" font-size="12">|0&#10217;</text>
        <text x="40" y="240" text-anchor="middle" font-size="12">|0&#10217;</text>
        <text x="40" y="294" text-anchor="middle" font-size="12">|0&#10217;</text>
      </g>
      <line class="qenc-wire qenc-w1" x1="56" y1="128" x2="588" y2="128" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <line class="qenc-wire qenc-w2" x1="56" y1="182" x2="588" y2="182" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <line class="qenc-wire qenc-w3" x1="56" y1="236" x2="588" y2="236" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <line class="qenc-wire qenc-w4" x1="56" y1="290" x2="588" y2="290" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
    </g>

    <!-- encoding gates: RY(pi x_j) -->
    <g font-size="11">
      <g class="qenc-encbox">
        <rect x="150" y="112" width="86" height="32" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6"/>
        <text x="193" y="132" text-anchor="middle" fill="var(--color-q0,#5fc9bf)">RY(&#960;x&#8320;)</text>
      </g>
      <g class="qenc-encbox" style="animation-delay:.3s">
        <rect x="150" y="166" width="86" height="32" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6"/>
        <text x="193" y="186" text-anchor="middle" fill="var(--color-q0,#5fc9bf)">RY(&#960;x&#8321;)</text>
      </g>
      <g class="qenc-encbox" style="animation-delay:.6s">
        <rect x="150" y="220" width="86" height="32" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6"/>
        <text x="193" y="240" text-anchor="middle" fill="var(--color-q0,#5fc9bf)">RY(&#960;x&#8322;)</text>
      </g>
      <g class="qenc-encbox" style="animation-delay:.9s">
        <rect x="150" y="274" width="86" height="32" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6"/>
        <text x="193" y="294" text-anchor="middle" fill="var(--color-q0,#5fc9bf)">RY(&#960;x&#8323;)</text>
      </g>
    </g>

    <!-- entangling structure inside ansatz: control dots + vertical CZ-like links + small rot boxes -->
    <g class="qenc-ent" stroke="var(--color-q1,#9d8cff)" stroke-width="1.6">
      <line x1="292" y1="128" x2="292" y2="182"/>
      <line x1="316" y1="182" x2="316" y2="236"/>
      <line x1="292" y1="236" x2="292" y2="290"/>
    </g>
    <g class="qenc-ent" fill="var(--color-q1,#9d8cff)">
      <circle cx="292" cy="128" r="4"/><circle cx="292" cy="182" r="4"/>
      <circle cx="316" cy="182" r="4"/><circle cx="316" cy="236" r="4"/>
      <circle cx="292" cy="236" r="4"/><circle cx="292" cy="290" r="4"/>
    </g>
    <g font-size="10" fill="var(--color-ink,#e9e7e0)">
      <rect x="350" y="114" width="52" height="28" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-q1,#9d8cff)" stroke-width="1.4"/>
      <text x="376" y="132" text-anchor="middle">R(&#952;)</text>
      <rect x="350" y="168" width="52" height="28" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-q1,#9d8cff)" stroke-width="1.4"/>
      <text x="376" y="186" text-anchor="middle">R(&#952;)</text>
      <rect x="350" y="222" width="52" height="28" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-q1,#9d8cff)" stroke-width="1.4"/>
      <text x="376" y="240" text-anchor="middle">R(&#952;)</text>
      <rect x="350" y="276" width="52" height="28" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-q1,#9d8cff)" stroke-width="1.4"/>
      <text x="376" y="294" text-anchor="middle">R(&#952;)</text>
    </g>

    <!-- measurement meters -->
    <g>
      <g transform="translate(0,0)">
        <rect x="474" y="114" width="40" height="28" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
        <path d="M480 136 A14 14 0 0 1 508 136" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.2"/>
        <line class="qenc-needle" x1="494" y1="136" x2="494" y2="122" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6"/>
      </g>
      <g>
        <rect x="474" y="168" width="40" height="28" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
        <path d="M480 190 A14 14 0 0 1 508 190" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.2"/>
        <line class="qenc-needle" x1="494" y1="190" x2="494" y2="176" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6" style="animation-delay:.4s"/>
      </g>
      <g>
        <rect x="474" y="222" width="40" height="28" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
        <path d="M480 244 A14 14 0 0 1 508 244" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.2"/>
        <line class="qenc-needle" x1="494" y1="244" x2="494" y2="230" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6" style="animation-delay:.8s"/>
      </g>
      <g>
        <rect x="474" y="276" width="40" height="28" rx="4" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
        <path d="M480 298 A14 14 0 0 1 508 298" fill="none" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.2"/>
        <line class="qenc-needle" x1="494" y1="298" x2="494" y2="284" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6" style="animation-delay:1.2s"/>
      </g>
    </g>

    <!-- outputs -->
    <g font-size="10.5" fill="var(--color-ink,#e9e7e0)">
      <line x1="514" y1="128" x2="560" y2="128" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3" marker-end="url(#qenc-ah)"/>
      <line x1="514" y1="182" x2="560" y2="182" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3" marker-end="url(#qenc-ah)"/>
      <line x1="514" y1="236" x2="560" y2="236" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3" marker-end="url(#qenc-ah)"/>
      <line x1="514" y1="290" x2="560" y2="290" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.3" marker-end="url(#qenc-ah)"/>
      <text x="572" y="132" fill="var(--color-q0,#5fc9bf)">&#10216;Z&#8320;&#10217;</text>
      <text x="572" y="186" fill="var(--color-q0,#5fc9bf)">&#10216;Z&#8321;&#10217;</text>
      <text x="572" y="240" fill="var(--color-q0,#5fc9bf)">&#10216;Z&#8322;&#10217;</text>
      <text x="572" y="294" fill="var(--color-q0,#5fc9bf)">&#10216;Z&#8323;&#10217;</text>
    </g>

    <text x="320" y="344" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">Model 1: a 2&#215;2 pixel patch &#8594; 4 RY rotations &#8594; entangling layer &#8594; 4 &#10216;Z&#10217; channels (14&#215;14&#215;4 feature stack)</text>
  </g>
</svg>
