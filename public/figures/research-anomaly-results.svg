<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="anom-r-title anom-r-desc">
  <title id="anom-r-title">Test macro-F1 by model on CICIDS2017</title>
  <desc id="anom-r-desc">A bar chart of test macro-F1 for five models. Logistic Regression 0.74, Decision Tree teacher 0.97 highlighted in teal, KNN 0.96, Naive Bayes 0.67 the weakest, and the neural-net student 0.75 highlighted in purple. Bars grow from the baseline. The tree teacher tops the chart while the distilled student lands near the linear baselines, well below its teacher.</desc>
  <style>
    @keyframes anom-r-grow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes anom-r-fade { from { opacity: 0; } to { opacity: 1; } }
    .anom-r-bar { animation: anom-r-grow 1.1s ease-out both; transform-origin: bottom; transform-box: fill-box; }
    .anom-r-b2 { animation-delay: 0.15s; } .anom-r-b3 { animation-delay: 0.3s; }
    .anom-r-b4 { animation-delay: 0.45s; } .anom-r-b5 { animation-delay: 0.6s; }
    .anom-r-val { animation: anom-r-fade 0.6s ease-out both; animation-delay: 1.0s; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } .anom-r-bar { transform: none; } .anom-r-val { opacity: 1; } }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="12">

    <text x="320" y="30" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="var(--color-q1, #9d8cff)">TEST MACRO-F1 &#183; CICIDS2017</text>

    <!-- gridlines + y labels -->
    <g stroke="var(--color-muted, #8a8f9c)" stroke-width="0.8" opacity="0.28">
      <line x1="70" y1="70"  x2="612" y2="70" />
      <line x1="70" y1="125" x2="612" y2="125" />
      <line x1="70" y1="180" x2="612" y2="180" />
      <line x1="70" y1="235" x2="612" y2="235" />
      <line x1="70" y1="290" x2="612" y2="290" />
    </g>
    <g fill="var(--color-muted, #8a8f9c)" font-size="9" text-anchor="end">
      <text x="60" y="74">1.0</text><text x="60" y="129">0.75</text>
      <text x="60" y="184">0.5</text><text x="60" y="239">0.25</text><text x="60" y="294">0</text>
    </g>

    <!-- bars (baseline y=290; 1.0 -> 220px tall) -->
    <!-- LogReg 0.74 -->
    <rect class="anom-r-bar" x="96"  y="127" width="56" height="163" rx="3" fill="var(--color-muted, #8a8f9c)" opacity="0.75" />
    <text class="anom-r-val" x="124" y="120" text-anchor="middle" font-size="10">0.74</text>
    <!-- Decision Tree 0.97 (teacher) -->
    <rect class="anom-r-bar anom-r-b2" x="204" y="77"  width="56" height="213" rx="3" fill="var(--color-q0, #5fc9bf)" />
    <text class="anom-r-val" x="232" y="70" text-anchor="middle" font-size="10" fill="var(--color-q0, #5fc9bf)">0.97</text>
    <!-- KNN 0.96 -->
    <rect class="anom-r-bar anom-r-b3" x="312" y="79"  width="56" height="211" rx="3" fill="var(--color-muted, #8a8f9c)" opacity="0.75" />
    <text class="anom-r-val" x="340" y="72" text-anchor="middle" font-size="10">0.96</text>
    <!-- Naive Bayes 0.67 -->
    <rect class="anom-r-bar anom-r-b4" x="420" y="143" width="56" height="147" rx="3" fill="var(--color-muted, #8a8f9c)" opacity="0.55" />
    <text class="anom-r-val" x="448" y="136" text-anchor="middle" font-size="10">0.67</text>
    <!-- Student 0.75 -->
    <rect class="anom-r-bar anom-r-b5" x="528" y="125" width="56" height="165" rx="3" fill="var(--color-q1, #9d8cff)" />
    <text class="anom-r-val" x="556" y="118" text-anchor="middle" font-size="10" fill="var(--color-q1, #9d8cff)">0.75</text>

    <!-- baseline -->
    <line x1="70" y1="290" x2="612" y2="290" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />

    <!-- x labels -->
    <g text-anchor="middle" font-size="9.5">
      <text x="124" y="307" fill="var(--color-muted, #8a8f9c)">LogReg</text>
      <text x="232" y="307" fill="var(--color-q0, #5fc9bf)">Tree &#9733;</text>
      <text x="340" y="307" fill="var(--color-muted, #8a8f9c)">KNN</text>
      <text x="448" y="307" fill="var(--color-muted, #8a8f9c)">NaiveB</text>
      <text x="556" y="307" fill="var(--color-q1, #9d8cff)">Student</text>
    </g>

    <text x="320" y="336" text-anchor="middle" font-size="10" fill="var(--color-muted, #8a8f9c)">&#9733; teacher chosen by macro-F1 &#183; the student lands 22 points below the tree it learned from</text>
  </g>
</svg>
