<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" role="img" aria-labelledby="alb-t alb-d">
  <title id="alb-t">The login that fought back: a swallowed-throw loop, and the fix</title>
  <desc id="alb-d">A five-step failure loop on the legacy web Google login. Step one: the legacy GoogleSignUp signs the user in and sets the auth cookie. Step two: it then throws, on an unregistered Cookies authentication scheme plus an Entity Framework duplicate-tracking _db.Update. Step three: the throw is swallowed and the method returns Success equals false. Step four: the callback redirects the user to a login page. Step five: the login page sees the fresh cookie and announces A user is already logged in this browser — which sends the user back around, a loop where they are simultaneously logged in and told they cannot log in. Below, the fix: converge the path onto the shared GoogleLoginCommand handler so the cookie is issued cleanly at the edge, closing the whole bug family. Hover or focus any step to read it.</desc>
  <style>
    .alb-node{ cursor:pointer; transition:opacity .2s ease; }
    .alb-node:focus{ outline:none; }
    .alb-hit{ fill:transparent; }
    svg:hover .alb-node:not(:hover),
    svg:focus-within .alb-node:not(:focus-within){ opacity:.3; }
    .alb-box{ transition:stroke-width .2s ease; }
    .alb-node:hover .alb-box,
    .alb-node:focus-within .alb-box{ stroke-width:2.4; }
    .alb-note{ opacity:0; transition:opacity .18s ease; }
    .alb-node:hover .alb-note,
    .alb-node:focus-within .alb-note{ opacity:1; }
    .alb-hint{ opacity:.6; }
    svg:hover .alb-hint, svg:focus-within .alb-hint{ opacity:0; transition:opacity .25s ease; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} }
  </style>
  <defs>
    <marker id="alb-ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--color-error,#ef4444)"/>
    </marker>
    <marker id="alb-ah2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--color-q0,#5fc9bf)"/>
    </marker>
  </defs>
  <g style="font-family:var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)" font-size="12">
    <text x="340" y="24" text-anchor="middle" font-size="11" letter-spacing="1.1" fill="var(--color-error,#ef4444)">signed in, then told you were already signed in &#8212; a loop</text>

    <!-- S1 -->
    <g class="alb-node" tabindex="0" role="group" aria-label="Step 1: legacy GoogleSignUp signs you in and sets the auth cookie">
      <title>1 &#183; GoogleSignUp signs you in &#8212; cookie SET</title>
      <rect class="alb-hit" x="116" y="40" width="448" height="42"/>
      <rect class="alb-box" x="120" y="44" width="440" height="34" rx="7" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <text x="136" y="65" font-size="10" fill="var(--color-q0,#5fc9bf)">1</text>
      <text x="344" y="65" text-anchor="middle" font-size="10">GoogleSignUp signs you in &#8212; auth cookie SET</text>
    </g>
    <path d="M340 78 V88" stroke="var(--color-error,#ef4444)" stroke-width="1.4" fill="none" marker-end="url(#alb-ah)"/>
    <!-- S2 -->
    <g class="alb-node" tabindex="0" role="group" aria-label="Step 2: it then throws on an unregistered Cookies scheme plus an EF duplicate-tracking _db.Update">
      <title>2 &#183; then throws: 'Cookies' scheme + EF _db.Update</title>
      <rect class="alb-hit" x="116" y="90" width="448" height="42"/>
      <rect class="alb-box" x="120" y="94" width="440" height="34" rx="7" fill="var(--color-error,#ef4444)" fill-opacity="0.10" stroke="var(--color-error,#ef4444)" stroke-width="1.5"/>
      <text x="136" y="115" font-size="10" fill="var(--color-error,#ef4444)">2</text>
      <text x="344" y="115" text-anchor="middle" font-size="10" fill="var(--color-error,#ef4444)">then throws: unregistered &#8220;Cookies&#8221; scheme + EF _db.Update</text>
    </g>
    <path d="M340 128 V138" stroke="var(--color-error,#ef4444)" stroke-width="1.4" fill="none" marker-end="url(#alb-ah)"/>
    <!-- S3 -->
    <g class="alb-node" tabindex="0" role="group" aria-label="Step 3: the throw is swallowed and the method returns Success equals false">
      <title>3 &#183; throw swallowed &#8594; returns Success=false</title>
      <rect class="alb-hit" x="116" y="140" width="448" height="42"/>
      <rect class="alb-box" x="120" y="144" width="440" height="34" rx="7" fill="var(--color-error,#ef4444)" fill-opacity="0.10" stroke="var(--color-error,#ef4444)" stroke-width="1.5"/>
      <text x="136" y="165" font-size="10" fill="var(--color-error,#ef4444)">3</text>
      <text x="344" y="165" text-anchor="middle" font-size="10" fill="var(--color-error,#ef4444)">throw swallowed &#8594; returns Success=false</text>
    </g>
    <path d="M340 178 V188" stroke="var(--color-error,#ef4444)" stroke-width="1.4" fill="none" marker-end="url(#alb-ah)"/>
    <!-- S4 -->
    <g class="alb-node" tabindex="0" role="group" aria-label="Step 4: the callback redirects the user to a login page">
      <title>4 &#183; callback redirects &#8594; login page</title>
      <rect class="alb-hit" x="116" y="190" width="448" height="42"/>
      <rect class="alb-box" x="120" y="194" width="440" height="34" rx="7" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <text x="136" y="215" font-size="10" fill="var(--color-muted,#8a8f9c)">4</text>
      <text x="344" y="215" text-anchor="middle" font-size="10">callback redirects &#8594; login page</text>
    </g>
    <path d="M340 228 V238" stroke="var(--color-error,#ef4444)" stroke-width="1.4" fill="none" marker-end="url(#alb-ah)"/>
    <!-- S5 -->
    <g class="alb-node" tabindex="0" role="group" aria-label="Step 5: the login page sees the fresh cookie and says A user is already logged in this browser, sending the user back around the loop">
      <title>5 &#183; login sees the cookie &#8594; &#8220;already logged in this browser&#8221;</title>
      <rect class="alb-hit" x="116" y="240" width="448" height="50"/>
      <rect class="alb-box" x="120" y="244" width="440" height="42" rx="7" fill="var(--color-error,#ef4444)" fill-opacity="0.14" stroke="var(--color-error,#ef4444)" stroke-width="1.7"/>
      <text x="136" y="263" font-size="10" fill="var(--color-error,#ef4444)">5</text>
      <text x="344" y="263" text-anchor="middle" font-size="10" fill="var(--color-error,#ef4444)">login sees the fresh cookie &#8594; &#8220;already logged in this browser&#8221;</text>
      <text x="344" y="278" text-anchor="middle" font-size="8.5" fill="var(--color-muted,#8a8f9c)">signed in, and told you can't sign in &#8212; the loop</text>
    </g>
    <!-- loop back arrow S5 -> S4 on the right -->
    <path d="M564 265 C596 265, 596 211, 566 211" stroke="var(--color-error,#ef4444)" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#alb-ah)"/>
    <text x="612" y="240" text-anchor="middle" font-size="8.5" fill="var(--color-error,#ef4444)">loop</text>

    <!-- fix -->
    <path d="M340 286 V300" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.5" fill="none" marker-end="url(#alb-ah2)"/>
    <g class="alb-node" tabindex="0" role="group" aria-label="The fix: converge the path onto the shared GoogleLoginCommand handler so the cookie is issued cleanly at the edge, closing the whole bug family">
      <title>fix &#183; converge onto the shared handler &#8212; cookie issued cleanly</title>
      <rect class="alb-hit" x="116" y="302" width="448" height="60"/>
      <rect class="alb-box" x="120" y="306" width="440" height="52" rx="8" fill="var(--color-q0,#5fc9bf)" fill-opacity="0.12" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.7"/>
      <text x="340" y="328" text-anchor="middle" font-size="10.5" fill="var(--color-q0,#5fc9bf)">the fix: converge onto the shared GoogleLoginCommand</text>
      <text x="340" y="345" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">cookie issued cleanly at the edge &#8212; the whole bug family closed</text>
      <text class="alb-note" x="340" y="357" text-anchor="middle" font-size="8" fill="var(--color-q0,#5fc9bf)">root cause was structural: the one user path still on the legacy repo</text>
    </g>

    <text x="340" y="392" text-anchor="middle" font-size="9" fill="var(--color-q1,#9d8cff)">a login that half-succeeds is worse than one that cleanly fails</text>

    <text class="alb-hint" x="668" y="24" text-anchor="end" font-size="9" fill="var(--color-muted,#8a8f9c)">hover a step &#9656;</text>
  </g>
</svg>
