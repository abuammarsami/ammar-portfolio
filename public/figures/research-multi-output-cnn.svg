<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 396" width="880" height="396" role="img" aria-labelledby="r5-title r5-desc">
  <title id="r5-title">One backbone, three heads</title>
  <desc id="r5-desc">A face image feeds one shared CNN backbone, drawn as a stack of convolutional layers. The backbone forks into three task-specific heads: an age regression head, a gender classification head, and a race classification head. Activation flows from the backbone out to all three heads at once. Each head feeds a single combined loss node on the right, which pulses to show that the three tasks train together on one joint objective.</desc>
  <defs>
    <marker id="r5-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
    </marker>
  </defs>
  <style>
    @keyframes r5-age { 0%{transform:translate(0,0);opacity:0} 6%{opacity:1} 46%{transform:translate(130px,-84px);opacity:1} 54%{opacity:0} 100%{opacity:0} }
    @keyframes r5-gen { 0%{transform:translate(0,0);opacity:0} 6%{opacity:1} 46%{transform:translate(130px,0);opacity:1} 54%{opacity:0} 100%{opacity:0} }
    @keyframes r5-rac { 0%{transform:translate(0,0);opacity:0} 6%{opacity:1} 46%{transform:translate(130px,84px);opacity:1} 54%{opacity:0} 100%{opacity:0} }
    @keyframes r5-join { 0%,44%{opacity:0.25} 56%{opacity:0.95} 72%{opacity:0.95} 84%{opacity:0.25} 100%{opacity:0.25} }
    @keyframes r5-pulse { 0%,100%{opacity:0.22} 50%{opacity:0.7} }
    .r5-age { animation: r5-age 5s ease-in-out infinite; }
    .r5-gen { animation: r5-gen 5s ease-in-out infinite; }
    .r5-rac { animation: r5-rac 5s ease-in-out infinite; }
    .r5-join { animation: r5-join 5s ease-in-out infinite; }
    .r5-pulse { animation: r5-pulse 3.2s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .r5-age, .r5-gen, .r5-rac { animation: none; opacity: 0; }
      .r5-join { animation: none; opacity: 0.5; }
      .r5-pulse { animation: none; opacity: 0.45; }
    }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- eyebrow -->
    <text x="440" y="28" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="var(--color-q1, #9d8cff)">ONE BACKBONE, THREE HEADS</text>

    <!-- ── FACE INPUT ── -->
    <rect x="28" y="164" width="108" height="72" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <g fill="none" stroke="var(--color-ink, #e9e7e0)" stroke-width="1.6">
      <circle cx="82" cy="192" r="14" />
      <circle cx="77" cy="189" r="1.6" fill="var(--color-ink, #e9e7e0)" stroke="none" />
      <circle cx="87" cy="189" r="1.6" fill="var(--color-ink, #e9e7e0)" stroke="none" />
      <path d="M 76 197 Q 82 201 88 197" />
    </g>
    <text x="82" y="226" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">face image</text>

    <!-- face → backbone -->
    <line x1="136" y1="200" x2="182" y2="200" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" opacity="0.6" marker-end="url(#r5-ah)" />

    <!-- ── SHARED CNN BACKBONE (layer stack) ── -->
    <rect x="196" y="158" width="140" height="84" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.6" opacity="0.5" />
    <rect x="204" y="150" width="140" height="84" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.6" opacity="0.75" />
    <rect x="212" y="142" width="140" height="84" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <text x="282" y="178" text-anchor="middle" font-size="12.5" fill="var(--color-q0, #5fc9bf)">shared CNN</text>
    <text x="282" y="196" text-anchor="middle" font-size="12.5" fill="var(--color-q0, #5fc9bf)">backbone</text>
    <text x="282" y="214" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">conv stack</text>

    <!-- backbone → three heads (fan out) -->
    <line x1="352" y1="184" x2="458" y2="120" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.55" marker-end="url(#r5-ah)" />
    <line x1="352" y1="200" x2="458" y2="200" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.55" marker-end="url(#r5-ah)" />
    <line x1="352" y1="216" x2="458" y2="280" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.55" marker-end="url(#r5-ah)" />

    <!-- ── THREE HEADS ── -->
    <!-- age -->
    <rect x="460" y="88" width="172" height="64" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-ink, #e9e7e0)" stroke-width="1.5" />
    <text x="546" y="114" text-anchor="middle" font-size="13">age</text>
    <text x="546" y="132" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">regression &#183; 1 value</text>
    <!-- gender -->
    <rect x="460" y="168" width="172" height="64" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-ink, #e9e7e0)" stroke-width="1.5" />
    <text x="546" y="194" text-anchor="middle" font-size="13">gender</text>
    <text x="546" y="212" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">classification &#183; 2</text>
    <!-- race -->
    <rect x="460" y="248" width="172" height="64" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-ink, #e9e7e0)" stroke-width="1.5" />
    <text x="546" y="274" text-anchor="middle" font-size="13">race</text>
    <text x="546" y="292" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">classification &#183; 5</text>

    <!-- heads → combined loss (fan in, pulsing to show joint training) -->
    <line class="r5-join" x1="632" y1="120" x2="726" y2="192" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.6" marker-end="url(#r5-ah)" />
    <line class="r5-join" x1="632" y1="200" x2="726" y2="200" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.6" marker-end="url(#r5-ah)" />
    <line class="r5-join" x1="632" y1="280" x2="726" y2="208" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.6" marker-end="url(#r5-ah)" />

    <!-- ── COMBINED LOSS ── -->
    <rect x="728" y="160" width="132" height="80" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <rect class="r5-pulse" x="728" y="160" width="132" height="80" rx="6" fill="none" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0.3" />
    <text x="794" y="196" text-anchor="middle" font-size="12.5" fill="var(--color-q0, #5fc9bf)">combined</text>
    <text x="794" y="214" text-anchor="middle" font-size="12.5" fill="var(--color-q0, #5fc9bf)">loss</text>

    <!-- ── travelling activation tokens (backbone → heads, simultaneous) ── -->
    <circle class="r5-age" cx="352" cy="200" r="5.5" fill="var(--color-q0, #5fc9bf)" />
    <circle class="r5-gen" cx="352" cy="200" r="5.5" fill="var(--color-q0, #5fc9bf)" />
    <circle class="r5-rac" cx="352" cy="200" r="5.5" fill="var(--color-q0, #5fc9bf)" />

    <!-- caption -->
    <text x="440" y="352" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">Fig. — one shared convolutional backbone forks into three heads — age (regression), gender and race</text>
    <text x="440" y="368" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">(classification) — trained jointly on one combined loss, so the shared features must serve all three tasks.</text>
  </g>
</svg>
