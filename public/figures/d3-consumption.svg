<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400" role="img" aria-labelledby="c6-title c6-desc">
  <title id="c6-title">Docs are the interface the AI works through</title>
  <desc id="c6-desc">A left-to-right flow. On the left, a docs slash corpus stack lists five document types — ADRs, plans, audits, business-rules, runbooks. In the middle sit four wiring layers stacked as lanes: a CLAUDE.md router that links out to docs, nested files that auto-load per subtree, a graphify graph that is queried not grepped, and .remember for continuity. On the right is the Agent context window — what the AI actually sees this turn. Document tokens leave the corpus, travel each lane, briefly light it teal as they cross, and land inside the agent context box. The corpus reaches the model only through this contract.</desc>
  <defs>
    <marker id="c6-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
    </marker>
  </defs>
  <style>
    @keyframes c6-flow {
      0%   { transform: translateX(0);     opacity: 0; }
      6%   { opacity: 1; }
      46%  { transform: translateX(470px); opacity: 1; }
      52%  { transform: translateX(470px); opacity: 0; }
      100% { transform: translateX(470px); opacity: 0; }
    }
    @keyframes c6-lite {
      0%, 8% { opacity: 0; }
      13%    { opacity: 0.9; }
      40%    { opacity: 0.9; }
      46%    { opacity: 0; }
      100%   { opacity: 0; }
    }
    @keyframes c6-glow { 0%, 100% { opacity: 0.32; } 50% { opacity: 0.8; } }
    .c6-flow { animation: c6-flow 6s ease-in-out infinite; }
    .c6-lite { animation: c6-lite 6s ease-in-out infinite; }
    .c6-d1 { animation-delay: 1.5s; }
    .c6-d2 { animation-delay: 3s; }
    .c6-d3 { animation-delay: 4.5s; }
    .c6-halo { animation: c6-glow 3.6s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .c6-flow { animation: none; opacity: 0; }
      .c6-lite { animation: none; opacity: 0; }
      .c6-halo { animation: none; opacity: 0.5; }
    }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- eyebrow -->
    <text x="450" y="28" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="var(--color-q1, #9d8cff)">THE DOCS ARE THE INTERFACE</text>

    <!-- column headers -->
    <text x="116" y="86" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">docs/ corpus</text>
    <text x="433" y="86" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">the wiring &#183; the contract</text>
    <text x="766" y="86" text-anchor="middle" font-size="10.5" fill="var(--color-muted, #8a8f9c)">what the AI sees</text>

    <!-- ── LEFT · corpus stack ── -->
    <rect x="30" y="104" width="172" height="200" rx="5" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" />
    <rect x="44" y="116" width="144" height="26" rx="3" fill="var(--color-bg, #0b0d12)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1" opacity="0.9" />
    <text x="54" y="133" font-size="11">ADRs</text>
    <rect x="44" y="150" width="144" height="26" rx="3" fill="var(--color-bg, #0b0d12)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1" opacity="0.9" />
    <text x="54" y="167" font-size="11">plans</text>
    <rect x="44" y="184" width="144" height="26" rx="3" fill="var(--color-bg, #0b0d12)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1" opacity="0.9" />
    <text x="54" y="201" font-size="11">audits</text>
    <rect x="44" y="218" width="144" height="26" rx="3" fill="var(--color-bg, #0b0d12)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1" opacity="0.9" />
    <text x="54" y="235" font-size="11">business-rules</text>
    <rect x="44" y="252" width="144" height="26" rx="3" fill="var(--color-bg, #0b0d12)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1" opacity="0.9" />
    <text x="54" y="269" font-size="11">runbooks</text>

    <!-- ── MIDDLE · wiring lanes ── -->
    <!-- lane 1 -->
    <rect x="232" y="108" width="402" height="46" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <rect class="c6-lite" x="232" y="108" width="402" height="46" rx="4" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0" />
    <text x="433" y="123" text-anchor="middle" font-size="11.5">CLAUDE.md router</text>
    <text x="433" y="149" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">links out to docs</text>

    <!-- lane 2 -->
    <rect x="232" y="160" width="402" height="46" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <rect class="c6-lite c6-d1" x="232" y="160" width="402" height="46" rx="4" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0" />
    <text x="433" y="175" text-anchor="middle" font-size="11.5">nested files</text>
    <text x="433" y="201" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">auto-load per subtree</text>

    <!-- lane 3 -->
    <rect x="232" y="212" width="402" height="46" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <rect class="c6-lite c6-d2" x="232" y="212" width="402" height="46" rx="4" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0" />
    <text x="433" y="227" text-anchor="middle" font-size="11.5">graphify graph</text>
    <text x="433" y="253" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">queried, not grepped</text>

    <!-- lane 4 -->
    <rect x="232" y="264" width="402" height="46" rx="4" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" />
    <rect class="c6-lite c6-d3" x="232" y="264" width="402" height="46" rx="4" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0" />
    <text x="433" y="279" text-anchor="middle" font-size="11.5">.remember</text>
    <text x="433" y="305" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">continuity across sessions</text>

    <!-- ── RIGHT · agent context window ── -->
    <rect x="662" y="104" width="208" height="200" rx="5" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <rect class="c6-halo" x="662" y="104" width="208" height="200" rx="5" fill="none" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0.4" />
    <text x="766" y="196" text-anchor="middle" font-size="13">Agent context</text>
    <text x="766" y="216" text-anchor="middle" font-size="13">window</text>
    <text x="766" y="238" text-anchor="middle" font-size="10" fill="var(--color-q0, #5fc9bf)">this turn</text>

    <!-- ── travelling document tokens (one per lane) ── -->
    <g class="c6-flow"><circle cx="206" cy="131" r="5.5" fill="var(--color-q0, #5fc9bf)" /></g>
    <g class="c6-flow c6-d1"><circle cx="206" cy="183" r="5.5" fill="var(--color-q0, #5fc9bf)" /></g>
    <g class="c6-flow c6-d2"><circle cx="206" cy="235" r="5.5" fill="var(--color-q0, #5fc9bf)" /></g>
    <g class="c6-flow c6-d3"><circle cx="206" cy="287" r="5.5" fill="var(--color-q0, #5fc9bf)" /></g>

    <!-- caption -->
    <text x="450" y="352" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">Fig. — the corpus reaches the model only through this contract. Every doc type flows in as</text>
    <text x="450" y="368" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">a routed, loaded, queried, remembered token — that contract is the interface it works through.</text>
  </g>
</svg>
