<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-labelledby="r6-title r6-desc">
  <title id="r6-title">Ensemble classification — diverse votes, one stable call</title>
  <desc id="r6-desc">One startup input feeds five diverse base models: logistic regression, random forest, gradient boosting, an RBF support vector machine, and LightGBM. Each casts a vote in turn — four vote success (teal check) and the SVM dissents with a failure vote (red cross). The votes funnel into a majority-vote box using hard voting, which resolves to a success call. Combining diverse, imperfect predictors cancels individual errors and yields a more stable success-or-fail decision than any single model.</desc>
  <defs>
    <marker id="r6-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted, #8a8f9c)" />
    </marker>
  </defs>
  <style>
    @keyframes r6-v1 { 0%,4%{opacity:0} 10%,94%{opacity:1} 100%{opacity:0} }
    @keyframes r6-v2 { 0%,16%{opacity:0} 22%,94%{opacity:1} 100%{opacity:0} }
    @keyframes r6-v3 { 0%,28%{opacity:0} 34%,94%{opacity:1} 100%{opacity:0} }
    @keyframes r6-v4 { 0%,40%{opacity:0} 46%,94%{opacity:1} 100%{opacity:0} }
    @keyframes r6-v5 { 0%,52%{opacity:0} 58%,94%{opacity:1} 100%{opacity:0} }
    @keyframes r6-final { 0%,66%{opacity:0} 74%,94%{opacity:1} 100%{opacity:0} }
    @keyframes r6-pulse { 0%,100%{opacity:0.22} 50%{opacity:0.7} }
    .r6-v1 { animation: r6-v1 7.5s ease-in-out infinite; }
    .r6-v2 { animation: r6-v2 7.5s ease-in-out infinite; }
    .r6-v3 { animation: r6-v3 7.5s ease-in-out infinite; }
    .r6-v4 { animation: r6-v4 7.5s ease-in-out infinite; }
    .r6-v5 { animation: r6-v5 7.5s ease-in-out infinite; }
    .r6-final { animation: r6-final 7.5s ease-in-out infinite; }
    .r6-pulse { animation: r6-pulse 3.2s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .r6-v1, .r6-v2, .r6-v3, .r6-v4, .r6-v5, .r6-final { animation: none; opacity: 1; }
      .r6-pulse { animation: none; opacity: 0.45; }
    }
  </style>
  <g style="font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace)" fill="var(--color-ink, #e9e7e0)" font-size="13">

    <!-- eyebrow -->
    <text x="450" y="28" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="var(--color-q1, #9d8cff)">ENSEMBLE &#183; DIVERSE VOTES, ONE STABLE CALL</text>

    <!-- ── STARTUP INPUT ── -->
    <rect x="30" y="197" width="120" height="90" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-q1, #9d8cff)" stroke-width="1.6" />
    <text x="90" y="238" text-anchor="middle" font-size="13">startup</text>
    <text x="90" y="256" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">49 features</text>

    <!-- startup → five models (fan out) -->
    <line x1="150" y1="242" x2="223" y2="106" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" opacity="0.5" marker-end="url(#r6-ah)" />
    <line x1="150" y1="242" x2="223" y2="174" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" opacity="0.5" marker-end="url(#r6-ah)" />
    <line x1="150" y1="242" x2="223" y2="242" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" opacity="0.5" marker-end="url(#r6-ah)" />
    <line x1="150" y1="242" x2="223" y2="310" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" opacity="0.5" marker-end="url(#r6-ah)" />
    <line x1="150" y1="242" x2="223" y2="378" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.3" opacity="0.5" marker-end="url(#r6-ah)" />

    <!-- ═══ BASE MODELS (dim base + animated active vote overlay) ═══ -->

    <!-- 1 · LogReg → success -->
    <rect x="225" y="78" width="158" height="56" rx="5" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.6" />
    <text x="304" y="103" text-anchor="middle" font-size="12" fill="var(--color-muted, #8a8f9c)">LogReg</text>
    <text x="304" y="120" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">linear</text>
    <g class="r6-v1" opacity="0">
      <rect x="225" y="78" width="158" height="56" rx="5" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.07" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.8" />
      <text x="304" y="103" text-anchor="middle" font-size="12" fill="var(--color-q0, #5fc9bf)">LogReg</text>
      <text x="304" y="120" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">linear</text>
      <line x1="399" y1="106" x2="529" y2="217" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.3" opacity="0.5" />
      <circle cx="399" cy="106" r="13" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.8" />
      <text x="399" y="111" text-anchor="middle" font-size="13" fill="var(--color-q0, #5fc9bf)">&#10003;</text>
    </g>

    <!-- 2 · RandomForest → success -->
    <rect x="225" y="146" width="158" height="56" rx="5" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.6" />
    <text x="304" y="171" text-anchor="middle" font-size="12" fill="var(--color-muted, #8a8f9c)">RandomForest</text>
    <text x="304" y="188" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">bagging</text>
    <g class="r6-v2" opacity="0">
      <rect x="225" y="146" width="158" height="56" rx="5" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.07" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.8" />
      <text x="304" y="171" text-anchor="middle" font-size="12" fill="var(--color-q0, #5fc9bf)">RandomForest</text>
      <text x="304" y="188" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">bagging</text>
      <line x1="399" y1="174" x2="529" y2="228" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.3" opacity="0.5" />
      <circle cx="399" cy="174" r="13" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.8" />
      <text x="399" y="179" text-anchor="middle" font-size="13" fill="var(--color-q0, #5fc9bf)">&#10003;</text>
    </g>

    <!-- 3 · GBM → success -->
    <rect x="225" y="214" width="158" height="56" rx="5" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.6" />
    <text x="304" y="239" text-anchor="middle" font-size="12" fill="var(--color-muted, #8a8f9c)">GBM</text>
    <text x="304" y="256" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">boosting</text>
    <g class="r6-v3" opacity="0">
      <rect x="225" y="214" width="158" height="56" rx="5" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.07" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.8" />
      <text x="304" y="239" text-anchor="middle" font-size="12" fill="var(--color-q0, #5fc9bf)">GBM</text>
      <text x="304" y="256" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">boosting</text>
      <line x1="399" y1="242" x2="529" y2="242" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.3" opacity="0.5" />
      <circle cx="399" cy="242" r="13" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.8" />
      <text x="399" y="247" text-anchor="middle" font-size="13" fill="var(--color-q0, #5fc9bf)">&#10003;</text>
    </g>

    <!-- 4 · SVM → fail (dissent) -->
    <rect x="225" y="282" width="158" height="56" rx="5" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.6" />
    <text x="304" y="307" text-anchor="middle" font-size="12" fill="var(--color-muted, #8a8f9c)">SVM</text>
    <text x="304" y="324" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">RBF kernel</text>
    <g class="r6-v4" opacity="0">
      <rect x="225" y="282" width="158" height="56" rx="5" fill="var(--color-error, #ef4444)" fill-opacity="0.07" stroke="var(--color-error, #ef4444)" stroke-width="1.8" />
      <text x="304" y="307" text-anchor="middle" font-size="12" fill="var(--color-error, #ef4444)">SVM</text>
      <text x="304" y="324" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">RBF kernel</text>
      <line x1="399" y1="310" x2="529" y2="256" stroke="var(--color-error, #ef4444)" stroke-width="1.3" opacity="0.5" />
      <circle cx="399" cy="310" r="13" fill="var(--color-surface, #12151d)" stroke="var(--color-error, #ef4444)" stroke-width="1.8" />
      <text x="399" y="315" text-anchor="middle" font-size="13" fill="var(--color-error, #ef4444)">&#10007;</text>
    </g>

    <!-- 5 · LightGBM → success -->
    <rect x="225" y="350" width="158" height="56" rx="5" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.6" />
    <text x="304" y="375" text-anchor="middle" font-size="12" fill="var(--color-muted, #8a8f9c)">LightGBM</text>
    <text x="304" y="392" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">boosting</text>
    <g class="r6-v5" opacity="0">
      <rect x="225" y="350" width="158" height="56" rx="5" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.07" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.8" />
      <text x="304" y="375" text-anchor="middle" font-size="12" fill="var(--color-q0, #5fc9bf)">LightGBM</text>
      <text x="304" y="392" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">boosting</text>
      <line x1="399" y1="378" x2="529" y2="267" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.3" opacity="0.5" />
      <circle cx="399" cy="378" r="13" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="1.8" />
      <text x="399" y="383" text-anchor="middle" font-size="13" fill="var(--color-q0, #5fc9bf)">&#10003;</text>
    </g>

    <!-- ── MAJORITY VOTE ── -->
    <rect x="530" y="200" width="170" height="84" rx="6" fill="var(--color-surface, #12151d)" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
    <rect class="r6-pulse" x="530" y="200" width="170" height="84" rx="6" fill="none" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" opacity="0.3" />
    <text x="615" y="234" text-anchor="middle" font-size="13" fill="var(--color-q0, #5fc9bf)">majority vote</text>
    <text x="615" y="252" text-anchor="middle" font-size="9.5" fill="var(--color-muted, #8a8f9c)">hard voting</text>
    <text x="615" y="270" text-anchor="middle" font-size="10" fill="var(--color-q0, #5fc9bf)">4 &#10003; &#183; 1 &#10007;</text>

    <!-- majority → final call -->
    <line x1="700" y1="242" x2="742" y2="242" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.5" opacity="0.6" marker-end="url(#r6-ah)" />

    <!-- ── FINAL CALL ── -->
    <rect x="744" y="212" width="140" height="60" rx="30" fill="var(--color-surface, #12151d)" stroke="var(--color-muted, #8a8f9c)" stroke-width="1.4" opacity="0.6" />
    <g class="r6-final" opacity="0">
      <rect x="744" y="212" width="140" height="60" rx="30" fill="var(--color-q0, #5fc9bf)" fill-opacity="0.1" stroke="var(--color-q0, #5fc9bf)" stroke-width="2" />
      <text x="814" y="240" text-anchor="middle" font-size="14" fill="var(--color-q0, #5fc9bf)">success &#10003;</text>
      <text x="814" y="258" text-anchor="middle" font-size="9" fill="var(--color-muted, #8a8f9c)">the stable call</text>
    </g>

    <!-- caption -->
    <text x="450" y="432" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">Fig. — five diverse base models each cast an imperfect vote; the SVM dissents, but hard-voting pools them so</text>
    <text x="450" y="448" text-anchor="middle" font-size="11" fill="var(--color-muted, #8a8f9c)">one model's error is outvoted. The ensemble's win is stability — top-tier accuracy with a tighter spread.</text>
  </g>
</svg>
