<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 372" role="img" aria-labelledby="qres-t qres-d">
  <title id="qres-t">Test accuracy: hybrid quantum models vs classical baselines</title>
  <desc id="qres-d">A grouped bar chart of MNIST test accuracy. Model 1, the quanvolutional network, reaches 0.92 against its classical baseline of 0.96. Model 2, the continuous-variable quantum neural network, reaches 0.72 against its classical baseline of 0.88. Both hybrids trail their classical counterparts; the gap is small for Model 1 and larger for Model 2. Bars grow from the axis on load. Hover or focus a bar to isolate it and read its exact value.</desc>
  <style>
    @keyframes qres-grow { from{transform:scaleY(0)} to{transform:scaleY(1)} }
    .qres-bar{ transform-box:fill-box; transform-origin:bottom; animation:qres-grow 1.1s cubic-bezier(.2,.7,.3,1) both; }
    .qres-b2{animation-delay:.14s}.qres-b3{animation-delay:.28s}.qres-b4{animation-delay:.42s}
    .qres-lab{ opacity:0; animation:qres-fade .5s ease-out forwards; }
    @keyframes qres-fade{ to{opacity:1} }
    .qres-l1{animation-delay:.7s}.qres-l2{animation-delay:.84s}.qres-l3{animation-delay:.98s}.qres-l4{animation-delay:1.12s}
    /* interactive (zero-JS): hover or keyboard-focus a column to isolate it */
    .qres-col{ cursor:pointer; transition:opacity .2s ease; }
    .qres-col:focus{ outline:none; }
    .qres-hit{ fill:transparent; }
    svg:hover .qres-col:not(:hover),
    svg:focus-within .qres-col:not(:focus-within){ opacity:.35; }
    .qres-col:hover .qres-rect,
    .qres-col:focus-within .qres-rect{ stroke:var(--color-ink,#e9e7e0); stroke-width:1.5; }
    .qres-note{ opacity:0; transition:opacity .18s ease; }
    .qres-col:hover .qres-note,
    .qres-col:focus-within .qres-note{ opacity:1; }
    .qres-hint{ opacity:.6; }
    svg:hover .qres-hint,
    svg:focus-within .qres-hint{ opacity:0; transition:opacity .2s ease; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} .qres-bar{transform:none!important} .qres-lab{opacity:1!important} }
  </style>
  <g style="font-family:var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)" font-size="12">
    <text x="320" y="26" text-anchor="middle" font-size="11" letter-spacing="1.4" fill="var(--color-q1,#9d8cff)">MNIST TEST ACCURACY &#183; HYBRID vs CLASSICAL</text>

    <!-- gridlines + y labels (baseline y=300 -> 0.0 ; top y=80 -> 1.0 ; 220px span) -->
    <g stroke="var(--color-muted,#8a8f9c)" stroke-width="1" opacity="0.28">
      <line x1="96" y1="300" x2="600" y2="300"/>
      <line x1="96" y1="245" x2="600" y2="245"/>
      <line x1="96" y1="190" x2="600" y2="190"/>
      <line x1="96" y1="135" x2="600" y2="135"/>
      <line x1="96" y1="80"  x2="600" y2="80"/>
    </g>
    <g font-size="9.5" fill="var(--color-muted,#8a8f9c)" text-anchor="end">
      <text x="88" y="304">0.00</text><text x="88" y="249">0.25</text><text x="88" y="194">0.50</text><text x="88" y="139">0.75</text><text x="88" y="84">1.00</text>
    </g>

    <!-- MODEL 1 group: classical 0.96 -> y=88.8 h=211.2 ; quantum 0.92 -> y=97.6 h=202.4 -->
    <g class="qres-col" tabindex="0" role="group" aria-label="Model 1 classical baseline, 0.96 test accuracy">
      <title>Model 1 &#183; classical baseline &#8212; 0.96 test accuracy</title>
      <rect class="qres-hit" x="150" y="70" width="58" height="238"/>
      <rect class="qres-bar qres-b1 qres-rect" x="150" y="88.8" width="58" height="211.2" rx="3" fill="var(--color-muted,#8a8f9c)" opacity="0.72"/>
      <text class="qres-lab qres-l1" x="179" y="80" text-anchor="middle" font-size="11" fill="var(--color-muted,#8a8f9c)">0.96</text>
      <text class="qres-note" x="179" y="316" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">baseline</text>
    </g>
    <g class="qres-col" tabindex="0" role="group" aria-label="Model 1 quanvolutional hybrid, 0.92 test accuracy, 0.04 below baseline">
      <title>Model 1 &#183; quanvolutional hybrid &#8212; 0.92 (&#8722;0.04 vs classical)</title>
      <rect class="qres-hit" x="216" y="70" width="58" height="238"/>
      <rect class="qres-bar qres-b2 qres-rect" x="216" y="97.6" width="58" height="202.4" rx="3" fill="var(--color-q0,#5fc9bf)"/>
      <text class="qres-lab qres-l2" x="245" y="88" text-anchor="middle" font-size="11" fill="var(--color-q0,#5fc9bf)">0.92</text>
      <text class="qres-note" x="245" y="316" text-anchor="middle" font-size="9" fill="var(--color-q0,#5fc9bf)">&#8722;0.04 gap</text>
    </g>

    <!-- MODEL 2 group: classical 0.88 -> y=106.4 h=193.6 ; quantum 0.72 -> y=141.6 h=158.4 -->
    <g class="qres-col" tabindex="0" role="group" aria-label="Model 2 classical baseline, 0.88 test accuracy">
      <title>Model 2 &#183; classical baseline &#8212; 0.88 test accuracy</title>
      <rect class="qres-hit" x="376" y="70" width="58" height="238"/>
      <rect class="qres-bar qres-b3 qres-rect" x="376" y="106.4" width="58" height="193.6" rx="3" fill="var(--color-muted,#8a8f9c)" opacity="0.72"/>
      <text class="qres-lab qres-l3" x="405" y="98" text-anchor="middle" font-size="11" fill="var(--color-muted,#8a8f9c)">0.88</text>
      <text class="qres-note" x="405" y="316" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">baseline</text>
    </g>
    <g class="qres-col" tabindex="0" role="group" aria-label="Model 2 continuous-variable hybrid, 0.72 test accuracy, 0.16 below baseline">
      <title>Model 2 &#183; CV-QNN hybrid &#8212; 0.72 (&#8722;0.16 vs classical)</title>
      <rect class="qres-hit" x="442" y="70" width="58" height="238"/>
      <rect class="qres-bar qres-b4 qres-rect" x="442" y="141.6" width="58" height="158.4" rx="3" fill="var(--color-q1,#9d8cff)"/>
      <text class="qres-lab qres-l4" x="471" y="133" text-anchor="middle" font-size="11" fill="var(--color-q1,#9d8cff)">0.72</text>
      <text class="qres-note" x="471" y="316" text-anchor="middle" font-size="9" fill="var(--color-q1,#9d8cff)">&#8722;0.16 gap</text>
    </g>

    <!-- group labels -->
    <text x="212" y="334" text-anchor="middle" font-size="10.5">Model 1 &#183; quanvolutional</text>
    <text x="438" y="334" text-anchor="middle" font-size="10.5">Model 2 &#183; CV-QNN</text>

    <!-- legend -->
    <g font-size="10">
      <rect x="150" y="350" width="12" height="12" rx="2" fill="var(--color-muted,#8a8f9c)" opacity="0.72"/>
      <text x="168" y="360">classical baseline</text>
      <rect x="300" y="350" width="12" height="12" rx="2" fill="var(--color-q0,#5fc9bf)"/>
      <rect x="316" y="350" width="12" height="12" rx="2" fill="var(--color-q1,#9d8cff)"/>
      <text x="334" y="360">hybrid quantum model</text>
    </g>

    <!-- interaction hint (fades out once the reader hovers the chart) -->
    <text class="qres-hint" x="596" y="26" text-anchor="end" font-size="9" fill="var(--color-muted,#8a8f9c)">hover a bar &#9656;</text>
  </g>
</svg>
