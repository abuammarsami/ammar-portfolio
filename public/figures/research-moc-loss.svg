<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="mocl-title mocl-desc">
  <title id="mocl-title">Balancing three losses on one shared trunk</title>
  <desc id="mocl-desc">Three per-head losses — age MAE scaled by 4.0, race cross-entropy scaled by 1.5, gender cross-entropy scaled by 0.1 — sum into one combined objective. A single emphasized gradient arrow flows back from the combined loss into the shared convolutional trunk, updating one set of weights. The weights are shown as bars: age weighted heaviest to lift its tiny normalized-MAE gradient into contention, gender weighted lightest because it converges early.</desc>
  <style>
    @keyframes mocl-flow { 0%{stroke-dashoffset:220;opacity:0.35} 50%{opacity:0.95} 100%{stroke-dashoffset:0;opacity:0.35} }
    @keyframes mocl-pulse { 0%,100%{opacity:0.2} 50%{opacity:0.7} }
    @keyframes mocl-grad { 0%{transform:translate(0,0);opacity:0} 10%{opacity:1} 90%{transform:translate(0,150px);opacity:1} 100%{opacity:0} }
    .mocl-flow{stroke-dasharray:6 6;animation:mocl-flow 3.2s linear infinite}
    .mocl-pulse{animation:mocl-pulse 3.2s ease-in-out infinite}
    .mocl-grad{animation:mocl-grad 3.8s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} .mocl-grad{opacity:0} .mocl-flow{stroke-dashoffset:0} }
  </style>
  <defs>
    <marker id="mocl-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-muted,#8a8f9c)" />
    </marker>
    <marker id="mocl-ah-t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="var(--color-q0,#5fc9bf)" />
    </marker>
  </defs>
  <g style="font-family: var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)" font-size="12">

    <text x="320" y="26" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="var(--color-q1,#9d8cff)">THREE LOSSES, ONE OBJECTIVE</text>

    <!-- three loss terms -->
    <rect x="24" y="58" width="188" height="46" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-ink,#e9e7e0)" stroke-width="1.3" />
    <text x="36" y="80" font-size="11">age . MAE</text>
    <text x="36" y="96" font-size="9.5" fill="var(--color-muted,#8a8f9c)">on normalized age ~0.05</text>
    <text x="198" y="86" text-anchor="end" font-size="14" fill="var(--color-q0,#5fc9bf)">x4.0</text>

    <rect x="24" y="116" width="188" height="46" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-ink,#e9e7e0)" stroke-width="1.3" />
    <text x="36" y="138" font-size="11">race . cat-CE</text>
    <text x="36" y="154" font-size="9.5" fill="var(--color-muted,#8a8f9c)">5-class</text>
    <text x="198" y="144" text-anchor="end" font-size="14" fill="var(--color-q0,#5fc9bf)">x1.5</text>

    <rect x="24" y="174" width="188" height="46" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-ink,#e9e7e0)" stroke-width="1.3" />
    <text x="36" y="196" font-size="11">gender . bin-CE</text>
    <text x="36" y="212" font-size="9.5" fill="var(--color-muted,#8a8f9c)">2-class, converges early</text>
    <text x="198" y="202" text-anchor="end" font-size="14" fill="var(--color-q0,#5fc9bf)">x0.1</text>

    <!-- arrows to sum -->
    <line class="mocl-flow" x1="212" y1="81" x2="292" y2="130" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6" marker-end="url(#mocl-ah)" />
    <line class="mocl-flow" x1="212" y1="139" x2="292" y2="139" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6" marker-end="url(#mocl-ah)" />
    <line class="mocl-flow" x1="212" y1="197" x2="292" y2="148" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.6" marker-end="url(#mocl-ah)" />

    <!-- combined loss -->
    <rect x="296" y="110" width="128" height="58" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="2" />
    <rect class="mocl-pulse" x="296" y="110" width="128" height="58" rx="6" fill="none" stroke="var(--color-q0,#5fc9bf)" stroke-width="2" />
    <text x="360" y="134" text-anchor="middle" font-size="12" fill="var(--color-q0,#5fc9bf)">weighted</text>
    <text x="360" y="151" text-anchor="middle" font-size="12" fill="var(--color-q0,#5fc9bf)">sum L</text>

    <!-- shared trunk (target of gradient) -->
    <rect x="446" y="110" width="170" height="58" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-ink,#e9e7e0)" stroke-width="1.5" />
    <text x="531" y="134" text-anchor="middle" font-size="12">shared trunk</text>
    <text x="531" y="151" text-anchor="middle" font-size="9.5" fill="var(--color-muted,#8a8f9c)">one set of weights</text>

    <!-- forward faint arrow trunk->loss (context) -->
    <line x1="446" y1="152" x2="424" y2="152" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.2" opacity="0.4" marker-end="url(#mocl-ah)" />

    <!-- gradient return path: loss down and back to trunk -->
    <polyline points="360,168 360,250 531,250 531,168" fill="none" stroke="var(--color-q0,#5fc9bf)" stroke-width="2.4" marker-end="url(#mocl-ah-t)" />
    <text x="445" y="242" text-anchor="middle" font-size="10" fill="var(--color-q0,#5fc9bf)">grad(L) - updates the shared weights</text>
    <circle class="mocl-grad" cx="360" cy="168" r="5" fill="var(--color-q0,#5fc9bf)" />

    <text x="320" y="300" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">The architecture is easy. The weights 4.0 / 1.5 / 0.1 are the craft -</text>
    <text x="320" y="316" text-anchor="middle" font-size="10.5" fill="var(--color-muted,#8a8f9c)">get them wrong and one task quietly starves the other two of gradient.</text>
  </g>
</svg>
