<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" role="img" aria-labelledby="pset-t pset-d">
  <title id="pset-t">The self-healing settlement pipeline</title>
  <desc id="pset-d">Every per-feature settler delegates to one coordinator. It looks the payment up by the gateway reference, checks the Purpose matches (else WRONG_PURPOSE), then branches on whether the payment is already Settled. A not-yet-settled payment resolves the gateway by the payment row's own country, verifies with the vendor, cross-checks the captured amount against the server-stored order (else AMOUNT_MISMATCH), and atomically claims Pending to Settled exactly once. An already-settled re-delivery skips the vendor round-trip and reuses the stored transaction id. Both paths then ALWAYS run the idempotent fulfilment step, which stamps FulfilledDate exactly once so it can never double-credit. If fulfilment fails the coordinator logs critical and returns FULFILMENT_FAILED — it never reports success, so the payment self-heals on the next callback or reconciliation pass. Hover or focus any stage to read what it guarantees.</desc>
  <style>
    .pset-node{ cursor:pointer; transition:opacity .2s ease; }
    .pset-node:focus{ outline:none; }
    .pset-hit{ fill:transparent; }
    svg:hover .pset-node:not(:hover),
    svg:focus-within .pset-node:not(:focus-within){ opacity:.32; }
    .pset-box{ transition:stroke .2s ease, stroke-width .2s ease; }
    .pset-node:hover .pset-box,
    .pset-node:focus-within .pset-box{ stroke:var(--color-ink,#e9e7e0); stroke-width:2; }
    .pset-note{ opacity:0; transition:opacity .18s ease; }
    .pset-node:hover .pset-note,
    .pset-node:focus-within .pset-note{ opacity:1; }
    .pset-hint{ opacity:.6; }
    svg:hover .pset-hint, svg:focus-within .pset-hint{ opacity:0; transition:opacity .25s ease; }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} }
  </style>
  <g style="font-family:var(--font-mono,'IBM Plex Mono',ui-monospace,monospace)" fill="var(--color-ink,#e9e7e0)" font-size="12">
    <text x="360" y="24" text-anchor="middle" font-size="11" letter-spacing="1.3" fill="var(--color-q1,#9d8cff)">PaymentSettlementCoordinator &#183; the ONE settlement gate</text>

    <!-- connective arrows drawn first (under nodes) -->
    <g stroke="var(--color-muted,#8a8f9c)" stroke-width="1.6" fill="none">
      <path d="M360 82 V96" marker-end="url(#pset-ah)"/>
      <path d="M360 138 V152" marker-end="url(#pset-ah)"/>
      <!-- branch out of the decision -->
      <path d="M300 196 H196 V216" marker-end="url(#pset-ah)"/>
      <path d="M420 196 H556 V246" marker-end="url(#pset-ah)"/>
      <!-- left path internal -->
      <path d="M196 254 V268" marker-end="url(#pset-ah)"/>
      <path d="M196 306 V320" marker-end="url(#pset-ah)"/>
      <path d="M196 358 V372" marker-end="url(#pset-ah)"/>
      <!-- both paths converge into fulfil -->
      <path d="M196 410 V430 H340" marker-end="url(#pset-ah)"/>
      <path d="M556 284 V430 H380" marker-end="url(#pset-ah)"/>
      <path d="M360 456 V466" marker-end="url(#pset-ah)"/>
    </g>
    <defs>
      <marker id="pset-ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0 1 L9 5 L0 9 z" fill="var(--color-muted,#8a8f9c)"/>
      </marker>
    </defs>

    <!-- 1. lookup -->
    <g class="pset-node" tabindex="0" role="group" aria-label="Look up the payment by the gateway reference">
      <title>Look up the payment by the gateway reference</title>
      <rect class="pset-hit" x="200" y="44" width="320" height="40"/>
      <rect class="pset-box" x="200" y="46" width="320" height="38" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <text x="360" y="70" text-anchor="middle" font-size="11.5">1 &#183; look up by ProviderPaymentId</text>
      <text class="pset-note" x="360" y="38" text-anchor="middle" font-size="9.5" fill="var(--color-muted,#8a8f9c)">no row &#8594; 404 NotFound &#183; the gateway ref is the settlement key</text>
    </g>

    <!-- 2. purpose check -->
    <g class="pset-node" tabindex="0" role="group" aria-label="Check the payment purpose matches this settler, else WRONG_PURPOSE">
      <title>Check the payment purpose matches this settler, else WRONG_PURPOSE</title>
      <rect class="pset-hit" x="200" y="100" width="320" height="40"/>
      <rect class="pset-box" x="200" y="102" width="320" height="38" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <text x="360" y="126" text-anchor="middle" font-size="11.5">2 &#183; Purpose == expected?</text>
      <text class="pset-note" x="360" y="94" text-anchor="middle" font-size="9.5" fill="var(--color-error,#ef4444)">mismatch &#8594; WRONG_PURPOSE (a boost row reached the membership settler = routing bug)</text>
    </g>

    <!-- 3. decision: already settled? -->
    <g class="pset-node" tabindex="0" role="group" aria-label="Branch on whether the payment is already settled">
      <title>Branch on whether the payment is already settled</title>
      <rect class="pset-hit" x="256" y="158" width="208" height="42"/>
      <rect class="pset-box" x="258" y="160" width="204" height="38" rx="19" fill="var(--color-surface,#12151d)" stroke="var(--color-q1,#9d8cff)" stroke-width="1.6"/>
      <text x="360" y="184" text-anchor="middle" font-size="11.5" fill="var(--color-q1,#9d8cff)">3 &#183; already Settled?</text>
      <text x="250" y="212" text-anchor="end" font-size="9" fill="var(--color-muted,#8a8f9c)">no &#8212; Pending</text>
      <text x="470" y="240" text-anchor="start" font-size="9" fill="var(--color-muted,#8a8f9c)">yes &#8212; re-delivery</text>
    </g>

    <!-- LEFT path (not yet settled) -->
    <g class="pset-node" tabindex="0" role="group" aria-label="Resolve the gateway by the payment row country, server-trusted">
      <title>Resolve the gateway by the payment row country, server-trusted</title>
      <rect class="pset-hit" x="44" y="216" width="304" height="40"/>
      <rect class="pset-box" x="46" y="218" width="300" height="36" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <text x="196" y="241" text-anchor="middle" font-size="10.5">resolve gateway &#183; by payment.CountryCode</text>
      <text class="pset-note" x="196" y="211" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">server-trusted country, not the caller's</text>
    </g>
    <g class="pset-node" tabindex="0" role="group" aria-label="Verify with the vendor, the single trusted settlement gate">
      <title>Verify with the vendor, the single trusted settlement gate</title>
      <rect class="pset-hit" x="44" y="268" width="304" height="38"/>
      <rect class="pset-box" x="46" y="270" width="300" height="36" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-q0,#5fc9bf)" stroke-width="1.5"/>
      <text x="196" y="293" text-anchor="middle" font-size="10.5" fill="var(--color-q0,#5fc9bf)">VerifyCallbackAsync &#8212; the trusted gate</text>
      <text class="pset-note" x="196" y="263" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">signature/execute verified before any state changes</text>
    </g>
    <g class="pset-node" tabindex="0" role="group" aria-label="Cross-check the captured amount against the server-stored order, else AMOUNT_MISMATCH">
      <title>Cross-check the captured amount against the server-stored order, else AMOUNT_MISMATCH</title>
      <rect class="pset-hit" x="44" y="320" width="304" height="38"/>
      <rect class="pset-box" x="46" y="322" width="300" height="36" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <text x="196" y="345" text-anchor="middle" font-size="10.5">amount == order? else AMOUNT_MISMATCH</text>
      <text class="pset-note" x="196" y="315" text-anchor="middle" font-size="9" fill="var(--color-error,#ef4444)">blocks a replayed cheap-payment callback settling an expensive order</text>
    </g>
    <g class="pset-node" tabindex="0" role="group" aria-label="Atomically claim Pending to Settled exactly once">
      <title>Atomically claim Pending to Settled exactly once</title>
      <rect class="pset-hit" x="44" y="372" width="304" height="38"/>
      <rect class="pset-box" x="46" y="374" width="300" height="36" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4"/>
      <text x="196" y="397" text-anchor="middle" font-size="10.5">PaymentMarkSettled &#183; claim once</text>
      <text class="pset-note" x="196" y="426" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">guarded UPDATE WHERE Status='Pending' &#8212; lost race is safe</text>
    </g>

    <!-- RIGHT path (already settled) -->
    <g class="pset-node" tabindex="0" role="group" aria-label="Already settled re-delivery reuses the stored transaction and skips the vendor">
      <title>Already settled re-delivery reuses the stored transaction and skips the vendor</title>
      <rect class="pset-hit" x="446" y="246" width="228" height="40"/>
      <rect class="pset-box" x="448" y="248" width="224" height="36" rx="6" fill="var(--color-surface,#12151d)" stroke="var(--color-muted,#8a8f9c)" stroke-width="1.4" stroke-dasharray="5 4"/>
      <text x="560" y="271" text-anchor="middle" font-size="10">reuse trx &#183; skip vendor</text>
      <text class="pset-note" x="560" y="300" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">money already captured &#8212; do NOT short-circuit; still fulfil</text>
    </g>

    <!-- FULFIL (the crux, accent) -->
    <g class="pset-node" tabindex="0" role="group" aria-label="Always run the idempotent fulfilment step, which stamps FulfilledDate exactly once">
      <title>Always run the idempotent fulfilment step, which stamps FulfilledDate exactly once</title>
      <rect class="pset-hit" x="150" y="428" width="420" height="40"/>
      <rect class="pset-box" x="152" y="430" width="416" height="38" rx="6" fill="var(--color-q0,#5fc9bf)" fill-opacity="0.14" stroke="var(--color-q0,#5fc9bf)" stroke-width="2"/>
      <text x="360" y="454" text-anchor="middle" font-size="11.5" fill="var(--color-q0,#5fc9bf)">4 &#183; ALWAYS run fulfil &#8212; idempotent</text>
      <text class="pset-note" x="360" y="422" text-anchor="middle" font-size="9" fill="var(--color-muted,#8a8f9c)">reached on a fresh claim, a lost claim race, AND a re-delivered already-settled callback</text>
    </g>

    <!-- outcome -->
    <g class="pset-node" tabindex="0" role="group" aria-label="If fulfilment fails, log critical and return FULFILMENT_FAILED, never success">
      <title>If fulfilment fails, log critical and return FULFILMENT_FAILED, never success</title>
      <rect class="pset-hit" x="150" y="470" width="420" height="26"/>
      <text x="360" y="482" text-anchor="middle" font-size="10">ok &#8594; <tspan fill="var(--color-q0,#5fc9bf)">Applied &#10003;</tspan>   |   fail &#8594; <tspan fill="var(--color-error,#ef4444)">FULFILMENT_FAILED</tspan></text>
      <text class="pset-note" x="360" y="494" text-anchor="middle" font-size="9" fill="var(--color-error,#ef4444)">LogCritical &#183; never reports success &#183; FulfilledDate still null &#8594; self-heals next pass</text>
    </g>

    <text class="pset-hint" x="708" y="24" text-anchor="end" font-size="9" fill="var(--color-muted,#8a8f9c)">hover a stage &#9656;</text>
  </g>
</svg>
